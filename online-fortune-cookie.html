<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>온라인 포춘 쿠키</title>

    <style>
        :root{
            --bg:#ffffff;
            --panel:#ffffff;
            --mint1:#d8f7c8;
            --mint2:#bff0a8;
            --orange1:#ffb43a;
            --orange2:#f08a00;
            --cream:#fff6da;
            --creamBorder:#f1d39c;
            --accent:#d97706;
            --shadow:0 22px 48px rgba(16,24,40,.12);
            --radius:34px;
        }

        *{box-sizing:border-box}
        body{
            margin:0;
            background:var(--bg);
            font-family:system-ui,-apple-system,"Noto Sans KR",sans-serif;
            color:#111827;
        }

        .wrap{
            min-height:100vh;
            display:flex;
            align-items:flex-start;
            justify-content:center;
            padding:46px 16px 70px;
        }

        .container{
            width:min(1000px,100%);
            text-align:center;
        }

        h1{
            margin:0 0 26px;
            font-size:54px;
            font-weight:950;
        }

        .panel{
            background:#fff;
            border-radius:44px;
            box-shadow:var(--shadow);
            padding:44px 28px 46px;
        }

        .stage{
            width:min(640px,100%);
            margin:0 auto 30px;
            background:linear-gradient(135deg,var(--mint1),var(--mint2));
            border-radius:26px;
            padding:50px 20px;
            position:relative;
            overflow:hidden;
        }

        /* 쿠키 이미지 */
        .cookieBox{
            position:relative;
            height:240px;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .cookieImg{
            width:340px;
            max-width:90%;
            transition:transform .4s ease, opacity .4s ease;
        }

        .cookieImg.hidden{
            opacity:0;
            transform:scale(.9);
            position:absolute;
        }

        /* 메시지 카드 */
        .msg{
            position:absolute;
            left:50%;
            top:50%;
            transform:translate(-50%,-50%);
            width:min(520px,92%);
            background:var(--cream);
            border:2px solid var(--creamBorder);
            border-radius:18px;
            padding:18px 18px;
            display:flex;
            align-items:center;
            gap:14px;
            box-shadow:0 14px 28px rgba(16,24,40,.12);
            opacity:0;
            pointer-events:none;
            transition:.3s ease;
        }

        .msg.show{
            opacity:1;
            pointer-events:auto;
        }

        .star{
            font-size:24px;
            color:#f59e0b;
        }

        .msgText{
            font-size:24px;
            font-weight:900;
            color:var(--accent);
        }

        /* 버튼 */
        .actions{
            display:flex;
            justify-content:center;
            gap:14px;
            flex-wrap:wrap;
        }

        .btn{
            border:none;
            cursor:pointer;
            font-weight:950;
            padding:16px 26px;
            border-radius:18px;
            font-size:22px;
            display:inline-flex;
            align-items:center;
            gap:12px;
            box-shadow:0 16px 28px rgba(16,24,40,.14);
        }

        .btn.primary{
            background:linear-gradient(180deg,var(--orange1),var(--orange2));
            color:#fff;
        }

        .btn.secondary{
            background:#fff;
            border:2px solid #d7dde6;
        }

        .btn:active{transform:scale(.98)}
        .btn[disabled]{opacity:.5;cursor:not-allowed}

        .toast{
            margin-top:16px;
            color:#6b7280;
            font-weight:700;
        }
    </style>
</head>

<body>

<div class="wrap">
    <div class="container">
        <h1>온라인 포춘 쿠키</h1>

        <div class="panel">
            <div class="stage">
                <div class="cookieBox">
                    <!-- 닫힌 쿠키 -->
                    <img id="cookieClosed"
                         class="cookieImg"
                         src="assets/img/fortune.webp"
                         alt="닫힌 포춘 쿠키">

                    <!-- 열린 쿠키 -->
                    <img id="cookieOpen"
                         class="cookieImg hidden"
                         src="assets/img/fortune_opened.webp"
                         alt="열린 포춘 쿠키">

                    <!-- 메시지 -->
                    <div id="msg" class="msg">
                        <div class="star">⭐</div>
                        <div id="msgText" class="msgText">오늘은 좋은 일이 생길 거예요.</div>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button id="btnOpen" class="btn primary">⚡ 포춘 쿠키 열기</button>
                <button id="btnReset" class="btn secondary">↩️ 다시 하기</button>
            </div>

            <div id="toast" class="toast">
                버튼을 눌러 포춘 쿠키를 열어보세요.
            </div>
        </div>
    </div>
</div>

<script>
    const fortunes = [
        "큰 결정을 내릴 때가 왔습니다.",
        "오늘은 뜻밖의 행운이 찾아옵니다.",
        "지금 시작하면 생각보다 빨리 풀립니다.",
        "새로운 인연이 좋은 기회를 가져옵니다.",
        "작은 친절이 큰 도움으로 돌아옵니다.",
        "미루던 일을 정리하면 마음이 가벼워집니다.",
        "한 번 더 확인하면 실수가 사라집니다.",
        "당신의 선택이 정답이 됩니다.",
        "지금은 속도보다 방향이 중요합니다.",
        "가장 가까운 곳에 답이 있습니다."
    ];

    const closedImg = document.getElementById("cookieClosed");
    const openImg = document.getElementById("cookieOpen");
    const msg = document.getElementById("msg");
    const msgText = document.getElementById("msgText");
    const btnOpen = document.getElementById("btnOpen");
    const btnReset = document.getElementById("btnReset");
    const toast = document.getElementById("toast");

    let opened = false;

    function randomFortune(){
        return fortunes[Math.floor(Math.random()*fortunes.length)];
    }

    function openCookie(){
        if(opened) return;
        opened = true;

        closedImg.classList.add("hidden");
        openImg.classList.remove("hidden");

        setTimeout(()=>{
            msgText.textContent = randomFortune();
            msg.classList.add("show");
        },200);

        btnOpen.disabled = true;
        toast.textContent = "포춘이 공개되었습니다!";
    }

    function reset(){
        opened = false;
        msg.classList.remove("show");
        openImg.classList.add("hidden");
        closedImg.classList.remove("hidden");
        btnOpen.disabled = false;
        toast.textContent = "버튼을 눌러 포춘 쿠키를 열어보세요.";
    }

    btnOpen.addEventListener("click",openCookie);
    btnReset.addEventListener("click",reset);
</script>

</body>
</html>
