<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>동체시력 테스트</title>
    <meta
            name="description"
            content="움직이는 공의 개수를 맞히는 동체시력 테스트입니다. 순수 HTML, CSS, JavaScript로 제작되었습니다."
    />
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            font-family: "Apple SD Gothic Neo", "Malgun Gothic", Arial, sans-serif;
            background: #f6f8fb;
            color: #222;
        }

        body {
            padding: 24px 16px 40px;
        }

        .wrap {
            max-width: 860px;
            margin: 0 auto;
        }

        .page-title {
            margin: 0 0 10px;
            font-size: 30px;
            font-weight: 800;
            color: #111;
            text-align: center;
        }

        .page-desc {
            margin: 0 auto 20px;
            padding: 16px 18px;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            line-height: 1.7;
            font-size: 15px;
            color: #555;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.04);
        }

        .card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .game-header {
            padding: 18px 18px 12px;
            border-bottom: 1px solid #f0f2f5;
            background: #fff;
        }

        .status-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .status-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            border-radius: 999px;
            background: #f3f4f6;
            color: #222;
            font-size: 14px;
            font-weight: 700;
        }

        .game-display {
            position: relative;
            padding: 16px;
            background: #fff;
        }

        .game-area {
            position: relative;
            width: 100%;
            height: 360px;
            border-radius: 18px;
            border: 1px solid #e5e7eb;
            background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
            overflow: hidden;
        }

        .overlay-message {
            position: absolute;
            z-index: 30;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: min(320px, calc(100% - 32px));
            padding: 20px 18px;
            border-radius: 18px;
            text-align: center;
            line-height: 1.7;
            box-shadow: 0 14px 35px rgba(0, 0, 0, 0.12);
        }

        .overlay-message.start {
            background: #ffffff;
            border: 1px solid #dbeafe;
            color: #1f2937;
        }

        .overlay-message.success {
            background: #ecfdf5;
            border: 1px solid #bbf7d0;
            color: #166534;
            display: none;
        }

        .overlay-message.end {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: #1d4ed8;
            display: none;
        }

        .overlay-message.error {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            display: none;
            width: auto;
            min-width: 220px;
            max-width: calc(100% - 32px);
            padding: 14px 16px;
        }

        .overlay-title {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 10px;
            color: #111827;
        }

        .controls {
            padding: 18px 16px 20px;
            background: #fff;
            border-top: 1px solid #f0f2f5;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }

        .guess-input {
            flex: 1;
            min-width: 0;
            height: 52px;
            border: 1px solid #d1d5db;
            border-radius: 14px;
            padding: 0 16px;
            font-size: 16px;
            background: #fff;
            color: #111;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .guess-input:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.15);
        }

        .btn {
            border: none;
            border-radius: 14px;
            padding: 0 18px;
            height: 52px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.06s ease, opacity 0.2s ease, box-shadow 0.2s ease;
            white-space: nowrap;
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-primary {
            background: #111827;
            color: #fff;
            box-shadow: 0 8px 20px rgba(17, 24, 39, 0.15);
        }

        .btn-primary:hover {
            opacity: 0.92;
        }

        .btn-secondary {
            background: #2563eb;
            color: #fff;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.18);
        }

        .btn-secondary:hover {
            opacity: 0.92;
        }

        .btn-light {
            background: #f3f4f6;
            color: #111827;
        }

        .info-box {
            margin-top: 20px;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            padding: 18px;
            line-height: 1.7;
            color: #555;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.04);
        }

        .ball {
            position: absolute;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 1px solid rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            user-select: none;
        }

        .number-label {
            position: absolute;
            width: 100%;
            text-align: center;
            font-size: 11px;
            font-weight: 700;
            color: #111;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .footer-note {
            margin-top: 18px;
            text-align: center;
            font-size: 13px;
            color: #888;
        }

        @media (max-width: 640px) {
            .page-title {
                font-size: 24px;
            }

            .game-area {
                height: 320px;
            }

            .input-row {
                flex-direction: column;
            }

            .btn,
            .guess-input {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="wrap">
    <h1 class="page-title">동체시력 테스트</h1>

    <div class="page-desc">
        움직이는 공이 몇 개인지 맞혀 보세요. 레벨이 올라갈수록 공의 개수와 속도가 빨라집니다.
        제한시간은 <strong>10초</strong>, 총 <strong>3번의 기회</strong>가 주어집니다.
    </div>

    <section class="card">
        <div class="game-header">
            <div class="status-bar">
                <div class="status-item">⏱ 시간: <span id="timer">10</span>초</div>
                <div class="status-item">🏆 점수: <span id="correctScore">0</span></div>
                <div class="status-item">🧡 기회: <span id="attempts">3</span></div>
                <div class="status-item">📈 레벨: <span id="level">1</span></div>
            </div>
        </div>

        <div class="game-display">
            <div id="gameArea" class="game-area">
                <div id="messageStart" class="overlay-message start">
                    <div class="overlay-title">테스트 시작</div>
                    움직이는 공의 개수를 맞혀 주세요.<br />
                    제한시간은 10초이며 총 3번의 기회가 있습니다.
                    <br /><br />
                    <button class="btn btn-secondary" id="startBtn">테스트 시작</button>
                </div>

                <div id="messageSuccess" class="overlay-message success"></div>
                <div id="messageEnd" class="overlay-message end"></div>
                <div id="messageError" class="overlay-message error"></div>
            </div>
        </div>

        <div class="controls">
            <div class="input-row">
                <input
                        id="userGuess"
                        class="guess-input"
                        type="number"
                        inputmode="numeric"
                        placeholder="공의 개수를 입력하세요"
                        autocomplete="off"
                />
                <button id="submitGuess" class="btn btn-primary">확인</button>
            </div>
        </div>
    </section>

    <div class="info-box">
        동체시력(DVA, Dynamic Visual Acuity)은 움직이는 물체를 또렷하게 인식하고,
        그 방향과 속도를 파악하는 능력을 의미합니다.
    </div>

    <div class="footer-note">순수 HTML + CSS + JavaScript 버전</div>
</div>

<script>
    const gameArea = document.getElementById("gameArea");
    const timerEl = document.getElementById("timer");
    const correctScoreEl = document.getElementById("correctScore");
    const attemptsEl = document.getElementById("attempts");
    const levelEl = document.getElementById("level");
    const userGuessEl = document.getElementById("userGuess");
    const submitGuessBtn = document.getElementById("submitGuess");
    const startBtn = document.getElementById("startBtn");

    const messageStart = document.getElementById("messageStart");
    const messageSuccess = document.getElementById("messageSuccess");
    const messageEnd = document.getElementById("messageEnd");
    const messageError = document.getElementById("messageError");

    let correctScore = 0;
    let wrongScore = 0;
    let attempts = 3;
    let level = 1;
    let ballCount = 0;
    let balls = [];
    let timerInterval = null;
    let elapsedTime = 10;
    let errorTimeout = null;

    function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function getRandomColor() {
        const palette = [
            "#3b82f6",
            "#10b981",
            "#f59e0b",
            "#ef4444",
            "#8b5cf6",
            "#06b6d4",
            "#ec4899",
            "#84cc16"
        ];
        return palette[Math.floor(Math.random() * palette.length)];
    }

    function updateScores() {
        correctScoreEl.textContent = correctScore;
        attemptsEl.textContent = attempts;
        levelEl.textContent = level;
    }

    function showErrorMessage(text) {
        messageError.textContent = text;
        messageError.style.display = "block";

        if (errorTimeout) {
            clearTimeout(errorTimeout);
        }

        errorTimeout = setTimeout(() => {
            messageError.style.display = "none";
        }, 700);
    }

    function clearMessages() {
        messageSuccess.style.display = "none";
        messageEnd.style.display = "none";
        messageError.style.display = "none";
    }

    function resetGameArea() {
        balls.forEach((ball) => clearInterval(ball.moveInterval));
        balls = [];
        clearMessages();

        const existingBalls = gameArea.querySelectorAll(".ball");
        existingBalls.forEach((ball) => ball.remove());

        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }

    function createBall() {
        const size = 22;
        const speedVariation = Math.random() - 0.5;
        const speed = level + 1 + speedVariation;

        const ball = document.createElement("div");
        ball.className = "ball";
        ball.style.width = size + "px";
        ball.style.height = size + "px";
        ball.style.backgroundColor = getRandomColor();
        ball.style.left = getRandomInt(0, gameArea.clientWidth - size) + "px";
        ball.style.top = getRandomInt(0, gameArea.clientHeight - size) + "px";

        gameArea.appendChild(ball);

        const ballObj = {
            element: ball,
            speed: speed,
            moveInterval: null
        };

        balls.push(ballObj);
        bounceBall(ballObj);
    }

    function bounceBall(ballObj) {
        let dx = ballObj.speed + Math.random() * 0.5 - 0.25;
        let dy = ballObj.speed + Math.random() * 0.5 - 0.25;

        function updateBallPosition() {
            const ball = ballObj.element;
            let newLeft = ball.offsetLeft + dx;
            let newTop = ball.offsetTop + dy;

            if (newLeft <= 0 || newLeft >= gameArea.clientWidth - ball.offsetWidth) {
                dx *= -1;
                newLeft = Math.max(0, Math.min(newLeft, gameArea.clientWidth - ball.offsetWidth));
            }

            if (newTop <= 0 || newTop >= gameArea.clientHeight - ball.offsetHeight) {
                dy *= -1;
                newTop = Math.max(0, Math.min(newTop, gameArea.clientHeight - ball.offsetHeight));
            }

            ball.style.left = newLeft + "px";
            ball.style.top = newTop + "px";
        }

        ballObj.moveInterval = setInterval(updateBallPosition, 30);
    }

    function stopBallsAndLabelThem() {
        balls.forEach((ball, index) => {
            clearInterval(ball.moveInterval);
            ball.element.style.backgroundColor = "#9ca3af";

            const label = document.createElement("span");
            label.className = "number-label";
            label.textContent = index + 1;
            ball.element.appendChild(label);
        });
    }

    function startTimer() {
        elapsedTime = 10;
        timerEl.textContent = elapsedTime;

        timerInterval = setInterval(() => {
            elapsedTime--;
            timerEl.textContent = elapsedTime;

            if (elapsedTime <= 0) {
                clearInterval(timerInterval);
                timerInterval = null;

                attempts--;
                updateScores();

                if (attempts <= 0) {
                    showFinalScore();
                } else {
                    showErrorMessage("시간초과! 다시 시도해보세요!");
                    userGuessEl.value = "";
                    userGuessEl.focus();
                    startNextRoundSameLevel();
                }
            }
        }, 1000);
    }

    function startGame() {
        resetGameArea();
        messageStart.style.display = "none";

        ballCount = level + getRandomInt(1, 3);

        for (let i = 0; i < ballCount; i++) {
            createBall();
        }

        updateScores();
        startTimer();
        userGuessEl.value = "";
        userGuessEl.focus();
    }

    function startNextRoundSameLevel() {
        setTimeout(() => {
            resetGameArea();

            ballCount = level + getRandomInt(1, 3);

            for (let i = 0; i < ballCount; i++) {
                createBall();
            }

            startTimer();
        }, 450);
    }

    function showCorrectMessage() {
        stopBallsAndLabelThem();

        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }

        messageSuccess.innerHTML = `
        <div class="overlay-title">정답입니다!</div>
        공의 수: <strong>${balls.length}개</strong>
        <br /><br />
        <button class="btn btn-secondary" id="nextLevelBtn">다음 레벨</button>
      `;
        messageSuccess.style.display = "block";

        const nextLevelBtn = document.getElementById("nextLevelBtn");
        nextLevelBtn.focus();
        nextLevelBtn.addEventListener("click", () => {
            level++;
            updateScores();
            startGame();
        });
    }

    function showFinalScore() {
        stopBallsAndLabelThem();

        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }

        messageEnd.innerHTML = `
        <div class="overlay-title">테스트 종료</div>
        최종 점수: <strong>${correctScore}점</strong>
        <br /><br />
        <button class="btn btn-secondary" id="restartGameBtn">다시하기</button>
      `;
        messageEnd.style.display = "block";

        const restartBtn = document.getElementById("restartGameBtn");
        restartBtn.addEventListener("click", resetAllGame);
    }

    function resetAllGame() {
        correctScore = 0;
        wrongScore = 0;
        attempts = 3;
        level = 1;
        ballCount = 0;
        balls = [];
        elapsedTime = 10;

        timerEl.textContent = elapsedTime;
        updateScores();
        resetGameArea();
        messageStart.style.display = "block";
        userGuessEl.value = "";
    }

    function submitGuess() {
        const userGuess = parseInt(userGuessEl.value, 10);

        if (!userGuess) {
            showErrorMessage("숫자를 입력하세요!");
            return;
        }

        if (userGuess === ballCount) {
            correctScore++;
            updateScores();
            showCorrectMessage();
        } else {
            wrongScore++;
            attempts--;
            updateScores();

            if (attempts <= 0) {
                showFinalScore();
            } else {
                showErrorMessage("틀렸어요! 다시 시도해보세요!");
                userGuessEl.value = "";
                userGuessEl.focus();
                startNextRoundSameLevel();
            }
        }
    }

    submitGuessBtn.addEventListener("click", submitGuess);

    userGuessEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
            submitGuess();
        }
    });

    startBtn.addEventListener("click", startGame);

    window.addEventListener("resize", () => {
        balls.forEach((ballObj) => {
            const ball = ballObj.element;
            const maxLeft = Math.max(0, gameArea.clientWidth - ball.offsetWidth);
            const maxTop = Math.max(0, gameArea.clientHeight - ball.offsetHeight);

            if (ball.offsetLeft > maxLeft) {
                ball.style.left = maxLeft + "px";
            }
            if (ball.offsetTop > maxTop) {
                ball.style.top = maxTop + "px";
            }
        });
    });

    updateScores();
    timerEl.textContent = "10";
</script>
</body>
</html>
