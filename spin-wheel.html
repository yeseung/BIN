<!-- 파일명 예시: spin-wheel.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>돌림판 돌리기</title>

    <style>
        :root{
            --bg:#ffffff;
            --panel:#ffffff;
            --soft:#f3f5f9;
            --border:#e9edf5;
            --text:#111827;
            --muted:#6b7280;

            --green:#33c31a;
            --green2:#6bdc27;

            --shadow:0 22px 48px rgba(16,24,40,.12);
            --shadow2:0 14px 28px rgba(16,24,40,.10);

            --radius:26px;
        }

        *{box-sizing:border-box}
        html,body{height:100%}
        body{
            margin:0;
            background:var(--bg);
            font-family:system-ui,-apple-system,"Noto Sans KR",sans-serif;
            color:var(--text);
        }

        .wrap{
            min-height:100%;
            display:flex;
            align-items:flex-start;
            justify-content:center;
            padding:46px 16px 70px;
        }

        .container{ width:min(1100px,100%); }

        h1{
            text-align:center;
            margin:0 0 26px;
            font-size:54px;
            font-weight:950;
            letter-spacing:-.7px;
        }

        /* Main frame */
        .frame{
            background:var(--panel);
            border-radius:34px;
            box-shadow:var(--shadow);
            overflow:hidden;
            border:1px solid rgba(0,0,0,.02);
        }

        .topbar{
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:18px 20px;
            border-bottom:1px solid #f1f4f9;
        }
        .brand{
            font-size:22px;
            font-weight:950;
        }
        .btnMini{
            border:2px solid #d7dde6;
            background:#fff;
            border-radius:14px;
            padding:12px 16px;
            cursor:pointer;
            font-weight:950;
            display:inline-flex;
            align-items:center;
            gap:10px;
        }
        .btnMini:active{transform:scale(.99)}

        .content{
            padding:22px 20px 26px;
        }

        .grid{
            display:grid;
            grid-template-columns: 1.2fr .8fr;
            gap:18px;
            align-items:start;
        }
        @media (max-width:980px){
            .grid{grid-template-columns:1fr}
        }

        /* Wheel area */
        .wheelCard{
            background:#fff;
            border-radius:28px;
            border:1px solid #eef2f7;
            box-shadow:var(--shadow2);
            padding:18px 16px 22px;
            min-height:520px;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            gap:18px;
        }

        .wheelWrap{
            width:min(520px, 92%);
            aspect-ratio:1/1;
            position:relative;
            display:grid;
            place-items:center;
            margin-top:8px;
        }

        /* pointer */
        .pointer{
            position:absolute;
            top:-6px;
            left:50%;
            transform:translateX(-50%);
            width:0;height:0;
            border-left:18px solid transparent;
            border-right:18px solid transparent;
            border-top:34px solid #111827;
            filter:drop-shadow(0 10px 12px rgba(16,24,40,.18));
            z-index:5;
        }

        .wheel{
            width:100%;
            height:100%;
            border-radius:999px;
            border:2px solid rgba(0,0,0,.06);
            box-shadow:0 24px 40px rgba(16,24,40,.10);
            background:#ddd;
            position:relative;
            overflow:hidden;
            transform:rotate(0deg);
            transition:transform 3.2s cubic-bezier(.13,.82,.17,.99);
        }

        .centerDot{
            position:absolute;
            width:46px;
            height:46px;
            border-radius:999px;
            background:#fff;
            border:4px solid #111827;
            box-shadow:0 14px 18px rgba(16,24,40,.12);
            z-index:6;
        }

        canvas{
            width:100%;
            height:100%;
            display:block;
        }

        .spinBtn{
            width:min(420px, 92%);
            border:none;
            cursor:pointer;
            font-weight:950;
            font-size:22px;
            padding:18px 18px;
            border-radius:22px;
            color:#fff;
            background:linear-gradient(90deg, var(--green2), var(--green));
            box-shadow:0 18px 34px rgba(51,195,26,.22);
            display:flex;
            align-items:center;
            justify-content:center;
            gap:12px;
        }
        .spinBtn:active{transform:scale(.99)}
        .spinBtn[disabled]{opacity:.6; cursor:not-allowed; transform:none}

        .hint{
            margin-top:-6px;
            color:var(--muted);
            font-weight:800;
        }

        /* Settings area */
        .setCard{
            background:#fff;
            border-radius:28px;
            border:1px solid #eef2f7;
            box-shadow:var(--shadow2);
            overflow:hidden;
        }

        .setHead{
            padding:18px 18px;
            font-weight:950;
            font-size:22px;
            border-bottom:1px solid #f1f4f9;
        }

        .setBody{
            padding:18px 18px 16px;
        }

        .setTopRow{
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:12px;
            flex-wrap:wrap;
            margin-bottom:12px;
        }

        .btnAdd{
            border:2px dashed #d7dde6;
            background:#fff;
            border-radius:14px;
            padding:12px 16px;
            cursor:pointer;
            font-weight:950;
            display:inline-flex;
            align-items:center;
            gap:10px;
        }
        .btnAdd:active{transform:scale(.99)}

        .smallMuted{color:var(--muted); font-weight:900}

        .items{
            max-height:260px;
            overflow:auto;
            padding-right:6px;
        }
        .itemRow{
            display:grid;
            grid-template-columns: 44px 1fr 44px;
            gap:12px;
            align-items:center;
            padding:10px 0;
            border-bottom:1px solid #f1f4f9;
        }
        .dot{
            width:34px;
            height:34px;
            border-radius:999px;
            box-shadow:0 10px 14px rgba(16,24,40,.10);
        }
        .itemInput{
            border:2px solid #d7dde6;
            border-radius:12px;
            padding:12px 12px;
            font-size:18px;
            font-weight:900;
            outline:none;
        }
        .itemInput:focus{
            border-color:rgba(51,195,26,.55);
            box-shadow:0 0 0 5px rgba(51,195,26,.10);
        }

        .btnTrash{
            width:44px;
            height:44px;
            border-radius:12px;
            border:2px solid #ffd0d0;
            background:#fff;
            cursor:pointer;
            font-size:18px;
        }
        .btnTrash:active{transform:scale(.98)}

        .scrollHint{
            height:10px;
            margin-top:10px;
            background:linear-gradient(90deg,#d9d9d9,#bdbdbd);
            border-radius:999px;
            opacity:.7;
        }

        .makeBtn{
            margin-top:16px;
            width:100%;
            border:none;
            cursor:pointer;
            font-weight:950;
            font-size:22px;
            padding:18px 18px;
            border-radius:22px;
            color:#fff;
            background:linear-gradient(90deg, var(--green2), var(--green));
            box-shadow:0 18px 34px rgba(51,195,26,.22);
            display:flex;
            align-items:center;
            justify-content:center;
            gap:12px;
        }
        .makeBtn:active{transform:scale(.99)}

        /* Modal */
        .overlay{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.35);
            display:none;
            align-items:center;
            justify-content:center;
            padding:18px;
            z-index:50;
        }
        .overlay.show{display:flex}

        .modal{
            width:min(520px, 100%);
            background:#fff;
            border-radius:18px;
            box-shadow:0 30px 70px rgba(0,0,0,.25);
            overflow:hidden;
        }
        .modalHead{
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:18px 18px;
            border-bottom:1px solid #f1f4f9;
            font-weight:950;
            font-size:20px;
        }
        .btnClose{
            border:none;
            background:transparent;
            cursor:pointer;
            font-size:22px;
            padding:6px 10px;
            color:#6b7280;
        }
        .modalBody{
            padding:22px 18px 18px;
            text-align:center;
        }
        .party{
            font-size:44px;
            margin:8px 0 4px;
        }
        .win{
            font-size:34px;
            font-weight:950;
            color:#1d4ed8;
            margin:8px 0 10px;
        }
        .subWin{
            font-weight:950;
            color:#111827;
        }
        .modalActions{
            display:flex;
            justify-content:center;
            gap:12px;
            padding:0 18px 18px;
        }
        .btnModal{
            border:none;
            cursor:pointer;
            font-weight:950;
            font-size:18px;
            padding:14px 16px;
            border-radius:12px;
            display:inline-flex;
            align-items:center;
            gap:10px;
        }
        .btnModal.primary{
            background:linear-gradient(90deg, var(--green2), var(--green));
            color:#fff;
        }
        .btnModal.secondary{
            background:#fff;
            border:2px solid #d7dde6;
            color:#111827;
        }
        .btnModal:active{transform:scale(.99)}
    </style>
</head>

<body>
<div class="wrap">
    <div class="container">
        <h1>돌림판 돌리기</h1>

        <div class="frame">
            <div class="topbar">
                <div class="brand">돌림판 게임</div>
                <button id="btnReset" class="btnMini" type="button">🔄 재설정</button>
            </div>

            <div class="content">
                <div class="grid">

                    <!-- LEFT: wheel -->
                    <div class="wheelCard">
                        <div class="wheelWrap">
                            <div class="pointer" aria-hidden="true"></div>
                            <div id="wheel" class="wheel" aria-label="돌림판">
                                <canvas id="canvas" width="600" height="600"></canvas>
                            </div>
                            <div class="centerDot" aria-hidden="true"></div>
                        </div>

                        <button id="btnSpin" class="spinBtn" type="button">⏳ 돌리기!</button>
                        <div class="hint">버튼을 눌러 돌림판을 돌려보세요!</div>
                    </div>

                    <!-- RIGHT: settings -->
                    <div class="setCard">
                        <div class="setHead">돌림판 설정</div>
                        <div class="setBody">
                            <div class="setTopRow">
                                <button id="btnAdd" class="btnAdd" type="button">＋ 항목 추가</button>
                                <div class="smallMuted">(<span id="count">0</span>개)</div>
                            </div>

                            <div id="items" class="items"></div>

                            <div class="scrollHint" aria-hidden="true"></div>

                            <button id="btnMake" class="makeBtn" type="button">▶ 돌림판 만들기</button>
                        </div>
                    </div>

                </div>
            </div>
        </div>

    </div>
</div>

<!-- Result Modal -->
<div id="overlay" class="overlay" role="dialog" aria-modal="true" aria-label="결과 확인">
    <div class="modal">
        <div class="modalHead">
            <div>결과 확인</div>
            <button id="btnClose" class="btnClose" type="button">×</button>
        </div>
        <div class="modalBody">
            <div class="party">🎉</div>
            <div id="winText" class="win">당첨!</div>
            <div id="winSub" class="subWin">-</div>
        </div>
        <div class="modalActions">
            <button id="btnShare" class="btnModal secondary" type="button">🔗 공유하기</button>
            <button id="btnOk" class="btnModal primary" type="button">확인</button>
        </div>
    </div>
</div>

<script>
    /* =========================================================
       Spin Wheel (Pure JS, Canvas)
       - 항목 추가/삭제/수정
       - "돌림판 만들기" → 캔버스 재그리기
       - "돌리기" → CSS rotate 애니메이션 + 결과 모달
    ========================================================= */

    const $ = (id) => document.getElementById(id);

    const canvas = $("canvas");
    const ctx = canvas.getContext("2d");
    const wheelEl = $("wheel");

    const itemsEl = $("items");
    const countEl = $("count");

    const btnAdd = $("btnAdd");
    const btnMake = $("btnMake");
    const btnSpin = $("btnSpin");
    const btnReset = $("btnReset");

    const overlay = $("overlay");
    const btnClose = $("btnClose");
    const btnOk = $("btnOk");
    const btnShare = $("btnShare");
    const winText = $("winText");
    const winSub = $("winSub");

    let items = [
        { text:"짜장면", color:"#ff5b5b" },
        { text:"짬뽕",  color:"#4aa7ff" },
        { text:"탕수육", color:"#34c759" },
        { text:"볶음밥", color:"#ffc21a" }
    ];

    // 회전 상태
    let spinning = false;
    let currentRotation = 0; // deg, 누적
    let lastWinner = null;

    // 색상 팔레트(추가 시 순환)
    const palette = ["#ff5b5b","#4aa7ff","#34c759","#ffc21a","#a855f7","#f97316","#14b8a6","#f43f5e"];

    function clamp(n,min,max){ return Math.max(min, Math.min(max,n)); }

    /* ---------- UI: item rows ---------- */
    function renderList(){
        itemsEl.innerHTML = "";
        countEl.textContent = String(items.length);

        items.forEach((it, idx) => {
            const row = document.createElement("div");
            row.className = "itemRow";

            const dot = document.createElement("div");
            dot.className = "dot";
            dot.style.background = it.color;

            const input = document.createElement("input");
            input.className = "itemInput";
            input.value = it.text;
            input.placeholder = "항목 입력";
            input.addEventListener("input", () => {
                items[idx].text = input.value.trim();
            });

            const trash = document.createElement("button");
            trash.className = "btnTrash";
            trash.type = "button";
            trash.textContent = "🗑️";
            trash.addEventListener("click", () => {
                if(items.length <= 2){
                    alert("최소 2개 항목이 필요해요.");
                    return;
                }
                items.splice(idx, 1);
                renderList();
                drawWheel();
            });

            row.appendChild(dot);
            row.appendChild(input);
            row.appendChild(trash);
            itemsEl.appendChild(row);
        });
    }

    /* ---------- Canvas: draw wheel ---------- */
    function drawWheel(){
        const valid = items
        .map(x => ({...x, text:(x.text||"").trim()}))
        .filter(x => x.text.length > 0);

        if(valid.length < 2){
            ctx.clearRect(0,0,canvas.width,canvas.height);
            // 안내 텍스트
            ctx.save();
            ctx.fillStyle = "#111827";
            ctx.font = "bold 24px system-ui, -apple-system, Noto Sans KR";
            ctx.textAlign = "center";
            ctx.fillText("항목을 2개 이상 입력하세요", canvas.width/2, canvas.height/2);
            ctx.restore();
            return;
        }

        const w = canvas.width, h = canvas.height;
        const cx = w/2, cy = h/2;
        const r = Math.min(w,h)/2 - 18;

        ctx.clearRect(0,0,w,h);

        const n = valid.length;
        const step = (Math.PI * 2) / n;

        // 링
        ctx.save();
        ctx.translate(cx, cy);

        for(let i=0; i<n; i++){
            const start = -Math.PI/2 + i*step;
            const end = start + step;

            // sector
            ctx.beginPath();
            ctx.moveTo(0,0);
            ctx.arc(0,0,r,start,end);
            ctx.closePath();
            ctx.fillStyle = valid[i].color;
            ctx.fill();

            // sector border
            ctx.strokeStyle = "rgba(0,0,0,.35)";
            ctx.lineWidth = 2;
            ctx.stroke();

            // text
            ctx.save();
            const mid = (start + end)/2;
            ctx.rotate(mid);
            ctx.textAlign = "center";
            ctx.fillStyle = "#ffffff";
            ctx.font = "900 24px system-ui, -apple-system, Noto Sans KR";
            ctx.translate(r*0.62, 0);
            ctx.rotate(Math.PI/2);
            // 길면 줄임
            const label = ellipsis(valid[i].text, 6);
            ctx.fillText(label, 0, 10);
            ctx.restore();
        }

        // center small circle
        ctx.beginPath();
        ctx.arc(0,0,22,0,Math.PI*2);
        ctx.fillStyle="#ffffff";
        ctx.fill();
        ctx.strokeStyle="#111827";
        ctx.lineWidth=4;
        ctx.stroke();

        ctx.restore();
    }

    function ellipsis(s, maxLen){
        const t = (s||"").trim();
        if([...t].length <= maxLen) return t;
        return [...t].slice(0,maxLen).join("") + "…";
    }

    /* ---------- Build wheel from list ---------- */
    function makeWheel(){
        // 빈 항목 정리
        items = items
        .map((it, i) => ({
            text:(it.text||"").trim(),
            color: it.color || palette[i % palette.length]
        }))
        .filter(it => it.text.length > 0);

        if(items.length < 2){
            alert("항목을 2개 이상 입력해 주세요.");
            return;
        }

        // 색 재정렬
        items.forEach((it,i)=>{
            if(!it.color) it.color = palette[i % palette.length];
        });

        renderList();
        drawWheel();
    }

    /* ---------- Spin logic ---------- */
    function spin(){
        if(spinning) return;

        const n = items.filter(it => (it.text||"").trim().length>0).length;
        if(n < 2){
            alert("항목을 2개 이상 입력해 주세요.");
            return;
        }

        spinning = true;
        btnSpin.disabled = true;

        // 목표 인덱스 랜덤
        const winnerIndex = Math.floor(Math.random() * items.length);
        const stepDeg = 360 / items.length;

        // 포인터는 위( -90deg 방향 )에 있음
        // wheel을 시계방향으로 돌리면, 포인터에 걸리는 섹터는 반대로 이동
        // 목표: winnerIndex가 포인터(위)에 오도록 회전 각을 계산
        // draw는 -90에서 시작이므로, index 0의 중앙은 -90 + step/2.
        const winnerMidDeg = (-90 + (winnerIndex + 0.5) * stepDeg);

        // 포인터는 -90deg 위치. wheel이 rotate(R) 되면 섹터 각도는 +R 이동
        // winnerMidDeg + R ≡ -90 (mod 360)
        // R ≡ -90 - winnerMidDeg
        let target = -90 - winnerMidDeg;

        // 보기 좋게 여러 바퀴 추가(6~9바퀴)
        const extraTurns = (6 + Math.floor(Math.random()*4)) * 360;
        target += extraTurns;

        // 누적 회전 기준으로 자연스럽게
        currentRotation = currentRotation % 360;
        const finalRotation = currentRotation + target;

        // 적용
        wheelEl.style.transform = `rotate(${finalRotation}deg)`;

        // 종료 후 결과 표시
        const endMs = 3200;
        setTimeout(() => {
            spinning = false;
            btnSpin.disabled = false;
            currentRotation = finalRotation;

            lastWinner = items[winnerIndex];
            showModal(lastWinner);
        }, endMs + 30);
    }

    /* ---------- Modal ---------- */
    function showModal(winner){
        winText.textContent = winner.text;
        winSub.textContent = "당첨! 🎉";
        overlay.classList.add("show");
    }

    function closeModal(){
        overlay.classList.remove("show");
    }

    async function share(){
        if(!lastWinner) return;
        const text = `🎡 돌림판 결과\n당첨: ${lastWinner.text}`;
        try{
            if(navigator.share){
                await navigator.share({ title:"돌림판 결과", text });
            }else{
                await navigator.clipboard.writeText(text);
                alert("공유 문구를 복사했어요!\n\n" + text);
            }
        }catch(e){}
    }

    /* ---------- Reset ---------- */
    function resetAll(){
        items = [
            { text:"짜장면", color:"#ff5b5b" },
            { text:"짬뽕",  color:"#4aa7ff" },
            { text:"탕수육", color:"#34c759" },
            { text:"볶음밥", color:"#ffc21a" }
        ];
        lastWinner = null;
        spinning = false;
        btnSpin.disabled = false;

        currentRotation = 0;
        wheelEl.style.transition = "none";
        wheelEl.style.transform = "rotate(0deg)";
        // transition 복구
        requestAnimationFrame(() => {
            wheelEl.style.transition = "transform 3.2s cubic-bezier(.13,.82,.17,.99)";
        });

        renderList();
        drawWheel();
    }

    /* ---------- Events ---------- */
    btnAdd.addEventListener("click", () => {
        if(items.length >= 12){
            alert("최대 12개까지 추가할 수 있어요.");
            return;
        }
        const color = palette[items.length % palette.length];
        items.push({ text:"", color });
        renderList();
    });

    btnMake.addEventListener("click", makeWheel);
    btnSpin.addEventListener("click", spin);
    btnReset.addEventListener("click", resetAll);

    btnClose.addEventListener("click", closeModal);
    btnOk.addEventListener("click", closeModal);
    btnShare.addEventListener("click", share);

    // 배경 클릭 닫기
    overlay.addEventListener("click", (e) => {
        if(e.target === overlay) closeModal();
    });

    /* init */
    renderList();
    drawWheel();
</script>

</body>
</html>
