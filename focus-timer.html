<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>포커스 타이머</title>
    <meta
            name="description"
            content="뽀모도로 방식으로 집중 시간과 휴식 시간을 관리하는 포커스 타이머입니다."
    />
    <style>
        :root {
            --bg: #f5f7fb;
            --card: #ffffff;
            --card-soft: #f8fafc;
            --line: #e5e7eb;
            --text: #111827;
            --muted: #6b7280;
            --primary: #111827;
            --primary-hover: #1f2937;
            --accent: #2563eb;
            --accent-soft: #dbeafe;
            --danger: #ef4444;
            --success: #16a34a;
            --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            background: linear-gradient(180deg, #f9fbff 0%, #f3f6fb 100%);
            color: var(--text);
            font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
        }

        body {
            min-height: 100vh;
        }

        .wrap {
            max-width: 1360px;
            margin: 0 auto;
            padding: 28px 18px 56px;
        }

        .page-header {
            margin-bottom: 22px;
        }

        .page-title {
            margin: 0 0 8px;
            font-size: 42px;
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: -0.03em;
        }

        .page-desc {
            margin: 0;
            color: var(--muted);
            font-size: 18px;
            line-height: 1.7;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 2.1fr) minmax(320px, 1fr);
            gap: 24px;
            align-items: start;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px;
        }

        .section-title {
            margin: 0 0 10px;
            font-size: 30px;
            font-weight: 800;
            line-height: 1.3;
        }

        .section-subtitle {
            margin: 0 0 24px;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.7;
        }

        .summary-row {
            margin-bottom: 22px;
            color: var(--muted);
            font-size: 17px;
            line-height: 1.8;
            font-weight: 700;
        }

        .summary-row strong {
            color: var(--text);
        }

        .field {
            margin-bottom: 20px;
        }

        .label {
            display: block;
            margin-bottom: 10px;
            font-size: 17px;
            font-weight: 800;
        }

        .task-input {
            width: 100%;
            height: 58px;
            border: 1px solid #d1d5db;
            border-radius: 16px;
            outline: none;
            background: #fff;
            color: var(--text);
            padding: 0 18px;
            font-size: 18px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .task-input:focus {
            border-color: #94a3b8;
            box-shadow: 0 0 0 5px rgba(148, 163, 184, 0.15);
        }

        .timer-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 410px;
            padding: 12px 0 6px;
        }

        .mode-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            padding: 8px 16px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 15px;
            font-weight: 800;
            margin-bottom: 18px;
        }

        .mode-badge.break {
            background: #ecfdf5;
            color: var(--success);
        }

        .time-display {
            font-size: clamp(80px, 12vw, 144px);
            line-height: 1;
            font-weight: 900;
            letter-spacing: 0.04em;
            margin: 6px 0 18px;
            font-variant-numeric: tabular-nums;
            color: var(--text);
        }

        .time-display.warning {
            color: var(--danger);
        }

        .progress-wrap {
            width: min(460px, 100%);
            margin-bottom: 24px;
        }

        .progress-bar {
            width: 100%;
            height: 14px;
            border-radius: 999px;
            background: #e5e7eb;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: var(--accent);
            border-radius: 999px;
            transition: width 0.25s linear, background-color 0.25s ease;
        }

        .progress-fill.break {
            background: var(--success);
        }

        .progress-fill.warning {
            background: var(--danger);
        }

        .progress-text {
            margin-top: 10px;
            text-align: center;
            color: var(--muted);
            font-size: 15px;
            font-weight: 700;
        }

        .main-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
        }

        .btn {
            appearance: none;
            border: none;
            cursor: pointer;
            border-radius: 16px;
            padding: 15px 22px;
            font-size: 17px;
            font-weight: 800;
            transition: all 0.18s ease;
            font-family: inherit;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 150px;
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 10px 20px rgba(17, 24, 39, 0.14);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-light {
            background: #f3f4f6;
            color: var(--text);
            border: 1px solid var(--line);
        }

        .btn-light:hover {
            background: #e5e7eb;
        }

        .btn-accent {
            background: var(--accent);
            color: #fff;
        }

        .btn-accent:hover {
            filter: brightness(0.96);
        }

        .btn-success {
            background: var(--success);
            color: #fff;
        }

        .btn-success:hover {
            filter: brightness(0.96);
        }

        .dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 26px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 999px;
            background: #e5e7eb;
            transition: all 0.2s ease;
        }

        .dot.active {
            background: var(--accent);
            transform: scale(1.05);
        }

        .dot.done {
            background: var(--success);
        }

        .settings-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .setting-item {
            display: block;
        }

        .setting-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 17px;
            font-weight: 800;
        }

        .setting-value {
            color: var(--accent);
            font-weight: 800;
        }

        input[type="range"] {
            width: 100%;
            accent-color: #3b82f6;
            cursor: pointer;
        }

        .records-card {
            margin-top: 24px;
        }

        .records-list {
            min-height: 220px;
            border: 1px solid var(--line);
            border-radius: 20px;
            background: #fbfcfe;
            padding: 18px;
        }

        .empty-record {
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--muted);
            font-size: 18px;
            line-height: 1.8;
        }

        .record-item {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            padding: 14px 0;
            border-bottom: 1px solid #edf2f7;
        }

        .record-item:last-child {
            border-bottom: none;
        }

        .record-left {
            min-width: 0;
        }

        .record-task {
            font-size: 16px;
            font-weight: 800;
            color: var(--text);
            word-break: break-word;
        }

        .record-meta {
            margin-top: 6px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.6;
        }

        .record-right {
            white-space: nowrap;
            font-size: 15px;
            font-weight: 800;
            color: var(--accent);
        }

        .message {
            display: none;
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 700;
            line-height: 1.6;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #ecfdf5;
            border: 1px solid #bbf7d0;
            color: #166534;
        }

        @media (max-width: 1100px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 900px) {
            .wrap {
                padding: 22px 14px 42px;
            }

            .page-title {
                font-size: 34px;
            }

            .page-desc {
                font-size: 16px;
            }

            .card {
                padding: 22px 16px;
            }

            .section-title {
                font-size: 26px;
            }

            .summary-row {
                font-size: 16px;
            }
        }

        @media (max-width: 640px) {
            .page-title {
                font-size: 30px;
            }

            .main-actions {
                width: 100%;
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .timer-area {
                min-height: 350px;
            }

            .record-item {
                flex-direction: column;
            }

            .record-right {
                white-space: normal;
            }
        }
    </style>
</head>
<body>
<main class="wrap">
    <header class="page-header">
        <h1 class="page-title">포커스 타이머</h1>
        <p class="page-desc">뽀모도로 기법으로 집중력을 높이세요</p>
    </header>

    <section class="layout">
        <div>
            <section class="card">
                <h2 class="section-title">준비</h2>
                <div class="summary-row">
                    오늘 <strong><span id="todaySessions">0</span>세션 완료</strong>
                    · 총 <strong><span id="todayFocusMinutes">0</span>분 집중</strong>
                </div>

                <div class="field">
                    <label class="label" for="taskInput">작업 내용</label>
                    <input
                            id="taskInput"
                            class="task-input"
                            type="text"
                            placeholder="집중할 작업을 입력하세요..."
                            maxlength="100"
                    />
                </div>

                <div class="timer-area">
                    <div id="modeBadge" class="mode-badge">집중 준비</div>

                    <div id="timeDisplay" class="time-display">25:00</div>

                    <div class="progress-wrap">
                        <div class="progress-bar">
                            <div id="progressFill" class="progress-fill"></div>
                        </div>
                        <div id="progressText" class="progress-text">0% 진행</div>
                    </div>

                    <div class="main-actions">
                        <button id="focusStartBtn" class="btn btn-primary" type="button">집중 시작</button>
                        <button id="breakStartBtn" class="btn btn-light" type="button">휴식 시작</button>
                        <button id="pauseBtn" class="btn btn-light" type="button">일시정지</button>
                        <button id="resetBtn" class="btn btn-light" type="button">초기화</button>
                    </div>

                    <div class="dots" id="sessionDots"></div>
                </div>

                <div id="statusMessage" class="message"></div>
            </section>

            <section class="card records-card">
                <h2 class="section-title">세션 기록</h2>
                <p class="section-subtitle">최근 완료한 집중 세션</p>
                <div id="recordsList" class="records-list">
                    <div class="empty-record">아직 완료한 세션이 없습니다</div>
                </div>
            </section>
        </div>

        <aside class="card">
            <h2 class="section-title">설정</h2>

            <div class="settings-list">
                <div class="setting-item">
                    <div class="setting-head">
                        <span>집중 시간</span>
                        <span class="setting-value" id="focusMinutesValue">25분</span>
                    </div>
                    <input id="focusMinutesRange" type="range" min="5" max="90" step="1" value="25" />
                </div>

                <div class="setting-item">
                    <div class="setting-head">
                        <span>휴식 시간</span>
                        <span class="setting-value" id="shortBreakValue">5분</span>
                    </div>
                    <input id="shortBreakRange" type="range" min="1" max="30" step="1" value="5" />
                </div>

                <div class="setting-item">
                    <div class="setting-head">
                        <span>긴 휴식</span>
                        <span class="setting-value" id="longBreakValue">15분</span>
                    </div>
                    <input id="longBreakRange" type="range" min="5" max="60" step="1" value="15" />
                </div>

                <div class="setting-item">
                    <div class="setting-head">
                        <span>긴 휴식까지</span>
                        <span class="setting-value" id="sessionsUntilLongBreakValue">4세션</span>
                    </div>
                    <input id="sessionsUntilLongBreakRange" type="range" min="2" max="8" step="1" value="4" />
                </div>
            </div>
        </aside>
    </section>
</main>

<script>
    const taskInput = document.getElementById("taskInput");
    const timeDisplay = document.getElementById("timeDisplay");
    const modeBadge = document.getElementById("modeBadge");
    const progressFill = document.getElementById("progressFill");
    const progressText = document.getElementById("progressText");
    const focusStartBtn = document.getElementById("focusStartBtn");
    const breakStartBtn = document.getElementById("breakStartBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const resetBtn = document.getElementById("resetBtn");
    const sessionDots = document.getElementById("sessionDots");
    const recordsList = document.getElementById("recordsList");
    const todaySessions = document.getElementById("todaySessions");
    const todayFocusMinutes = document.getElementById("todayFocusMinutes");
    const statusMessage = document.getElementById("statusMessage");

    const focusMinutesRange = document.getElementById("focusMinutesRange");
    const shortBreakRange = document.getElementById("shortBreakRange");
    const longBreakRange = document.getElementById("longBreakRange");
    const sessionsUntilLongBreakRange = document.getElementById("sessionsUntilLongBreakRange");

    const focusMinutesValue = document.getElementById("focusMinutesValue");
    const shortBreakValue = document.getElementById("shortBreakValue");
    const longBreakValue = document.getElementById("longBreakValue");
    const sessionsUntilLongBreakValue = document.getElementById("sessionsUntilLongBreakValue");

    let timerId = null;
    let currentMode = "focus";
    let remainingSeconds = 25 * 60;
    let totalSeconds = 25 * 60;
    let isRunning = false;
    let isPaused = false;

    let completedFocusSessions = 0;
    let todayCompletedSessions = 0;
    let todayFocusedMinutes = 0;
    let sessionHistory = [];

    function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
    }

    function getFocusMinutes() {
        return Number(focusMinutesRange.value);
    }

    function getShortBreakMinutes() {
        return Number(shortBreakRange.value);
    }

    function getLongBreakMinutes() {
        return Number(longBreakRange.value);
    }

    function getSessionsUntilLongBreak() {
        return Number(sessionsUntilLongBreakRange.value);
    }

    function updateSettingLabels() {
        focusMinutesValue.textContent = `${getFocusMinutes()}분`;
        shortBreakValue.textContent = `${getShortBreakMinutes()}분`;
        longBreakValue.textContent = `${getLongBreakMinutes()}분`;
        sessionsUntilLongBreakValue.textContent = `${getSessionsUntilLongBreak()}세션`;
    }

    function updateSummary() {
        todaySessions.textContent = todayCompletedSessions;
        todayFocusMinutes.textContent = todayFocusedMinutes;
    }

    function showStatus(text) {
        statusMessage.textContent = text;
        statusMessage.className = "message show success";
        clearTimeout(showStatus._timer);
        showStatus._timer = setTimeout(() => {
            statusMessage.className = "message";
            statusMessage.textContent = "";
        }, 1800);
    }

    function updateDots() {
        sessionDots.innerHTML = "";
        const target = getSessionsUntilLongBreak();

        for (let i = 0; i < target; i++) {
            const dot = document.createElement("div");
            dot.className = "dot";

            if (i < completedFocusSessions % target) {
                dot.classList.add("done");
            }

            if (completedFocusSessions % target === i && currentMode === "focus") {
                dot.classList.add("active");
            }

            if (completedFocusSessions % target === 0 && completedFocusSessions > 0 && i === target - 1 && currentMode !== "focus") {
                dot.classList.add("done");
            }

            sessionDots.appendChild(dot);
        }
    }

    function updateModeUI() {
        const isBreak = currentMode === "shortBreak" || currentMode === "longBreak";

        if (currentMode === "focus") {
            modeBadge.textContent = isRunning ? "집중 시간" : "집중 준비";
            modeBadge.className = "mode-badge";
        } else if (currentMode === "shortBreak") {
            modeBadge.textContent = isRunning ? "짧은 휴식" : "휴식 준비";
            modeBadge.className = "mode-badge break";
        } else {
            modeBadge.textContent = isRunning ? "긴 휴식" : "긴 휴식 준비";
            modeBadge.className = "mode-badge break";
        }

        progressFill.classList.toggle("break", isBreak);
    }

    function updateTimerDisplay() {
        timeDisplay.textContent = formatTime(remainingSeconds);

        const warningThreshold = 60;
        const isWarning = remainingSeconds <= warningThreshold && remainingSeconds > 0;
        timeDisplay.classList.toggle("warning", isWarning);
        progressFill.classList.toggle("warning", isWarning);
    }

    function updateProgress() {
        const elapsed = totalSeconds - remainingSeconds;
        const percent = totalSeconds > 0 ? Math.min((elapsed / totalSeconds) * 100, 100) : 0;
        progressFill.style.width = `${percent}%`;
        progressText.textContent = `${Math.floor(percent)}% 진행`;
    }

    function updatePauseButton() {
        pauseBtn.textContent = isPaused ? "다시 시작" : "일시정지";
    }

    function renderRecords() {
        if (sessionHistory.length === 0) {
            recordsList.innerHTML = `<div class="empty-record">아직 완료한 세션이 없습니다</div>`;
            return;
        }

        recordsList.innerHTML = sessionHistory
        .map((item) => {
            return `
            <div class="record-item">
              <div class="record-left">
                <div class="record-task">${escapeHtml(item.task || "작업 내용 없음")}</div>
                <div class="record-meta">${item.dateText}</div>
              </div>
              <div class="record-right">${item.minutes}분 집중</div>
            </div>
          `;
        })
        .join("");
    }

    function escapeHtml(text) {
        return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function setMode(mode) {
        currentMode = mode;

        if (mode === "focus") {
            totalSeconds = getFocusMinutes() * 60;
        } else if (mode === "shortBreak") {
            totalSeconds = getShortBreakMinutes() * 60;
        } else {
            totalSeconds = getLongBreakMinutes() * 60;
        }

        remainingSeconds = totalSeconds;
        isRunning = false;
        isPaused = false;

        updateModeUI();
        updateTimerDisplay();
        updateProgress();
        updatePauseButton();
        updateDots();
    }

    function startCurrentMode() {
        if (isRunning && !isPaused) return;

        if (!isRunning) {
            remainingSeconds = remainingSeconds > 0 ? remainingSeconds : totalSeconds;
        }

        isRunning = true;
        isPaused = false;
        updateModeUI();
        updatePauseButton();

        clearInterval(timerId);
        timerId = setInterval(() => {
            if (!isRunning || isPaused) return;

            remainingSeconds -= 1;
            updateTimerDisplay();
            updateProgress();

            if (remainingSeconds <= 0) {
                completeCurrentMode();
            }
        }, 1000);
    }

    function completeCurrentMode() {
        clearInterval(timerId);
        timerId = null;
        isRunning = false;
        isPaused = false;
        remainingSeconds = 0;
        updateTimerDisplay();
        updateProgress();
        updatePauseButton();

        if (currentMode === "focus") {
            completedFocusSessions += 1;
            todayCompletedSessions += 1;
            todayFocusedMinutes += getFocusMinutes();

            sessionHistory.unshift({
                task: taskInput.value.trim(),
                minutes: getFocusMinutes(),
                dateText: new Date().toLocaleString("ko-KR")
            });

            if (sessionHistory.length > 10) {
                sessionHistory = sessionHistory.slice(0, 10);
            }

            updateSummary();
            renderRecords();
            updateDots();

            if (completedFocusSessions % getSessionsUntilLongBreak() === 0) {
                setMode("longBreak");
                showStatus("집중 세션 완료! 긴 휴식 시간입니다.");
            } else {
                setMode("shortBreak");
                showStatus("집중 세션 완료! 짧은 휴식 시간입니다.");
            }
        } else {
            setMode("focus");
            showStatus("휴식이 끝났습니다. 다시 집중할 시간입니다.");
        }

        playBell();
    }

    function playBell() {
        try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.type = "sine";
            oscillator.frequency.setValueAtTime(880, audioContext.currentTime);
            oscillator.frequency.setValueAtTime(660, audioContext.currentTime + 0.18);
            gainNode.gain.setValueAtTime(0.05, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.8);

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.8);
        } catch (e) {
        }
    }

    function togglePause() {
        if (!isRunning && remainingSeconds === totalSeconds) return;
        if (!isRunning && remainingSeconds < totalSeconds) {
            startCurrentMode();
            return;
        }

        isPaused = !isPaused;
        updatePauseButton();
    }

    function resetTimer() {
        clearInterval(timerId);
        timerId = null;
        setMode(currentMode);
        showStatus("타이머를 초기화했습니다.");
    }

    function startFocusMode() {
        clearInterval(timerId);
        setMode("focus");
        startCurrentMode();
    }

    function startBreakMode() {
        clearInterval(timerId);

        if (completedFocusSessions > 0 && completedFocusSessions % getSessionsUntilLongBreak() === 0) {
            setMode("longBreak");
        } else {
            setMode("shortBreak");
        }

        startCurrentMode();
    }

    function handleSettingChange() {
        updateSettingLabels();

        if (!isRunning) {
            setMode(currentMode);
        } else {
            updateDots();
        }
    }

    focusStartBtn.addEventListener("click", startFocusMode);
    breakStartBtn.addEventListener("click", startBreakMode);
    pauseBtn.addEventListener("click", togglePause);
    resetBtn.addEventListener("click", resetTimer);

    focusMinutesRange.addEventListener("input", handleSettingChange);
    shortBreakRange.addEventListener("input", handleSettingChange);
    longBreakRange.addEventListener("input", handleSettingChange);
    sessionsUntilLongBreakRange.addEventListener("input", handleSettingChange);

    taskInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            startFocusMode();
        }
    });

    updateSettingLabels();
    updateSummary();
    renderRecords();
    setMode("focus");
</script>
</body>
</html>
