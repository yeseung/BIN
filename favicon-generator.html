<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>파비콘 생성기</title>
    <meta
            name="description"
            content="텍스트 또는 이미지를 사용해서 다양한 크기의 파비콘을 생성하고 다운로드할 수 있습니다."
    />
    <style>
        :root {
            --bg: #f5f7fb;
            --card: #ffffff;
            --soft: #f8fafc;
            --line: #e5e7eb;
            --text: #111827;
            --muted: #6b7280;
            --primary: #111827;
            --primary-hover: #1f2937;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            background: linear-gradient(180deg, #f9fbff 0%, #f3f6fb 100%);
            color: var(--text);
            font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
        }

        body {
            min-height: 100vh;
        }

        .wrap {
            max-width: 1320px;
            margin: 0 auto;
            padding: 28px 18px 56px;
        }

        .page-header {
            margin-bottom: 22px;
        }

        .page-title {
            margin: 0 0 8px;
            font-size: 42px;
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: -0.03em;
        }

        .page-desc {
            margin: 0;
            color: var(--muted);
            font-size: 18px;
            line-height: 1.7;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            align-items: start;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px;
        }

        .section-title {
            margin: 0 0 6px;
            font-size: 30px;
            font-weight: 800;
            line-height: 1.3;
        }

        .section-desc {
            margin: 0 0 24px;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.7;
        }

        .field {
            margin-top: 18px;
        }

        .label {
            display: block;
            margin-bottom: 10px;
            font-size: 17px;
            font-weight: 800;
        }

        .sub-label {
            margin-top: 10px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.6;
        }

        .drop-zone {
            width: 100%;
            min-height: 152px;
            border: 2px dashed #cfd8e3;
            border-radius: 20px;
            background: #fbfcfe;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            overflow: hidden;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: #94a3b8;
            background: #f3f7fc;
        }

        .drop-zone-content {
            color: var(--muted);
            line-height: 1.8;
            font-size: 17px;
        }

        .drop-zone-content strong {
            display: block;
            color: var(--text);
            font-size: 19px;
            margin-bottom: 6px;
        }

        .drop-zone img {
            max-width: 100%;
            max-height: 180px;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
        }

        .file-input {
            display: none;
        }

        .text-input,
        .color-text {
            width: 100%;
            height: 56px;
            border: 1px solid #d1d5db;
            outline: none;
            background: #fff;
            color: var(--text);
            border-radius: 16px;
            padding: 0 16px;
            font-size: 24px;
            font-weight: 700;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .text-input:focus,
        .color-text:focus,
        .code-box:focus {
            border-color: #94a3b8;
            box-shadow: 0 0 0 5px rgba(148, 163, 184, 0.15);
        }

        .color-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin-top: 18px;
        }

        .color-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .color-picker {
            width: 56px;
            min-width: 56px;
            height: 56px;
            border: 1px solid #d1d5db;
            border-radius: 14px;
            background: #fff;
            cursor: pointer;
            padding: 4px;
        }

        .range-wrap {
            margin-top: 18px;
        }

        .range-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
            font-size: 17px;
            font-weight: 800;
        }

        .range-value {
            color: var(--accent);
            font-weight: 800;
        }

        input[type="range"] {
            width: 100%;
            accent-color: #3b82f6;
            cursor: pointer;
        }

        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            appearance: none;
            border: none;
            cursor: pointer;
            border-radius: 16px;
            padding: 15px 20px;
            font-size: 16px;
            font-weight: 800;
            transition: all 0.18s ease;
            font-family: inherit;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 10px 20px rgba(17, 24, 39, 0.14);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-accent {
            background: var(--accent);
            color: #fff;
        }

        .btn-accent:hover {
            background: var(--accent-hover);
        }

        .btn-light {
            background: #f3f4f6;
            color: var(--text);
            border: 1px solid var(--line);
        }

        .btn-light:hover {
            background: #e5e7eb;
        }

        .btn-block {
            width: 100%;
        }

        .preview-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .preview-box {
            background: #fbfcfe;
            border: 1px solid var(--line);
            border-radius: 20px;
            min-height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 26px;
            overflow: auto;
        }

        .preview-stage {
            width: 128px;
            height: 128px;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(0,0,0,0.08);
            overflow: hidden;
            flex-shrink: 0;
            background: #fff;
        }

        .preview-stage img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .preview-stage span {
            display: flex;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            user-select: none;
        }

        .download-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
        }

        .size-btn {
            width: 100%;
            min-height: 56px;
        }

        .size-list {
            margin: 0;
            padding-left: 22px;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.9;
        }

        .code-card {
            margin-top: 24px;
        }

        .code-box {
            width: 100%;
            min-height: 170px;
            resize: vertical;
            border: 1px solid #d1d5db;
            border-radius: 18px;
            background: #fbfcfe;
            color: var(--text);
            padding: 18px;
            font-size: 16px;
            line-height: 1.8;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            outline: none;
        }

        .message {
            display: none;
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 700;
            line-height: 1.6;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #ecfdf5;
            border: 1px solid #bbf7d0;
            color: #166534;
        }

        .message.error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
        }

        .helper {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.7;
        }

        @media (max-width: 1100px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 900px) {
            .wrap {
                padding: 22px 14px 42px;
            }

            .page-title {
                font-size: 34px;
            }

            .page-desc {
                font-size: 16px;
            }

            .card {
                padding: 22px 16px;
            }

            .section-title {
                font-size: 26px;
            }

            .download-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .color-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .page-title {
                font-size: 30px;
            }

            .download-grid {
                grid-template-columns: 1fr 1fr;
            }

            .btn-row {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .text-input {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
<main class="wrap">
    <header class="page-header">
        <h1 class="page-title">파비콘 생성기</h1>
        <p class="page-desc">웹사이트용 파비콘을 쉽게 만들어보세요</p>
    </header>

    <section class="layout">
        <div class="card">
            <h2 class="section-title">파비콘 설정</h2>
            <p class="section-desc">텍스트 또는 이미지로 파비콘을 생성하세요</p>

            <div class="field">
                <label class="label">이미지 업로드 (선택)</label>
                <div id="dropZone" class="drop-zone" tabindex="0">
                    <div id="dropZoneContent" class="drop-zone-content">
                        <strong>클릭하거나 이미지를 드래그하세요</strong>
                        Ctrl+V로 붙여넣기 가능
                    </div>
                </div>
                <input
                        type="file"
                        id="fileInput"
                        class="file-input"
                        accept="image/png,image/jpeg,image/jpg,image/gif,image/webp,image/svg+xml"
                />
            </div>

            <div class="field">
                <label class="label" for="textInput">텍스트 (최대 2글자)</label>
                <input id="textInput" class="text-input" type="text" value="A" maxlength="2" />
            </div>

            <div class="color-grid">
                <div class="field" style="margin-top:0;">
                    <label class="label">배경색</label>
                    <div class="color-row">
                        <input id="bgColor" class="color-picker" type="color" value="#3b82f6" />
                        <input id="bgColorText" class="color-text" type="text" value="#3b82f6" />
                    </div>
                </div>

                <div class="field" style="margin-top:0;">
                    <label class="label">글자색</label>
                    <div class="color-row">
                        <input id="textColor" class="color-picker" type="color" value="#ffffff" />
                        <input id="textColorText" class="color-text" type="text" value="#ffffff" />
                    </div>
                </div>
            </div>

            <div class="range-wrap">
                <div class="range-head">
                    <span>글자 크기</span>
                    <span class="range-value" id="fontSizeValue">32px</span>
                </div>
                <input id="fontSizeRange" type="range" min="12" max="80" value="32" />
            </div>

            <div class="range-wrap">
                <div class="range-head">
                    <span>모서리 둥글기</span>
                    <span class="range-value" id="radiusValue">8px</span>
                </div>
                <input id="radiusRange" type="range" min="0" max="64" value="8" />
            </div>

            <div class="btn-row">
                <button id="downloadAllBtn" class="btn btn-primary btn-block" type="button">모든 크기 다운로드</button>
                <button id="clearBtn" class="btn btn-light btn-block" type="button">초기화</button>
            </div>

            <div id="controlMessage" class="message"></div>
        </div>

        <div class="card preview-panel">
            <div>
                <h2 class="section-title">미리보기</h2>
                <p class="section-desc">생성된 파비콘 미리보기</p>

                <div class="preview-box">
                    <div id="previewStage" class="preview-stage"></div>
                </div>
            </div>

            <div>
                <h2 class="section-title" style="font-size:24px; margin-bottom:14px;">크기별 다운로드</h2>
                <div class="download-grid">
                    <button class="btn btn-light size-btn" data-size="16" type="button">16×16</button>
                    <button class="btn btn-light size-btn" data-size="32" type="button">32×32</button>
                    <button class="btn btn-light size-btn" data-size="48" type="button">48×48</button>
                    <button class="btn btn-light size-btn" data-size="64" type="button">64×64</button>
                    <button class="btn btn-light size-btn" data-size="128" type="button">128×128</button>
                    <button class="btn btn-light size-btn" data-size="180" type="button">180×180</button>
                    <button class="btn btn-light size-btn" data-size="192" type="button">192×192</button>
                    <button class="btn btn-light size-btn" data-size="512" type="button">512×512</button>
                </div>

                <div class="helper" style="margin-top:18px;">
                    <ul class="size-list">
                        <li>16×16: 브라우저 탭</li>
                        <li>32×32: 브라우저 탭 (고해상도)</li>
                        <li>180×180: Apple Touch Icon</li>
                        <li>192×192: Android Chrome</li>
                        <li>512×512: PWA</li>
                    </ul>
                </div>
            </div>
        </div>
    </section>

    <section class="card code-card">
        <h2 class="section-title">HTML 코드</h2>
        <p class="section-desc">웹사이트에 추가할 파비콘 코드</p>

        <textarea id="htmlCode" class="code-box" readonly></textarea>

        <div class="btn-row">
            <button id="copyCodeBtn" class="btn btn-accent" type="button">코드 복사</button>
        </div>

        <div id="codeMessage" class="message"></div>
    </section>
</main>

<script>
    const SIZES = [16, 32, 48, 64, 128, 180, 192, 512];

    const dropZone = document.getElementById("dropZone");
    const dropZoneContent = document.getElementById("dropZoneContent");
    const fileInput = document.getElementById("fileInput");
    const textInput = document.getElementById("textInput");
    const bgColor = document.getElementById("bgColor");
    const bgColorText = document.getElementById("bgColorText");
    const textColor = document.getElementById("textColor");
    const textColorText = document.getElementById("textColorText");
    const fontSizeRange = document.getElementById("fontSizeRange");
    const fontSizeValue = document.getElementById("fontSizeValue");
    const radiusRange = document.getElementById("radiusRange");
    const radiusValue = document.getElementById("radiusValue");
    const previewStage = document.getElementById("previewStage");
    const downloadAllBtn = document.getElementById("downloadAllBtn");
    const clearBtn = document.getElementById("clearBtn");
    const htmlCode = document.getElementById("htmlCode");
    const copyCodeBtn = document.getElementById("copyCodeBtn");
    const controlMessage = document.getElementById("controlMessage");
    const codeMessage = document.getElementById("codeMessage");
    const sizeButtons = document.querySelectorAll(".size-btn");

    let uploadedImage = null;
    let uploadedImageUrl = "";
    let uploadedImageName = "favicon";

    function showMessage(target, text, type) {
        target.textContent = text;
        target.className = `message show ${type}`;
    }

    function clearMessage(target) {
        target.textContent = "";
        target.className = "message";
    }

    function syncRangeLabels() {
        fontSizeValue.textContent = `${fontSizeRange.value}px`;
        radiusValue.textContent = `${radiusRange.value}px`;
    }

    function isHexColor(value) {
        return /^#([0-9a-fA-F]{6})$/.test(value);
    }

    function syncColorFromPicker(picker, input) {
        input.value = picker.value;
        renderPreview();
    }

    function syncColorFromText(input, picker) {
        const value = input.value.trim();
        if (isHexColor(value)) {
            picker.value = value;
            renderPreview();
        }
    }

    function escapeText(text) {
        return text.replace(/\s+/g, "").slice(0, 2) || "A";
    }

    function updateDropPreviewImage(url) {
        dropZoneContent.innerHTML = "";
        const img = document.createElement("img");
        img.src = url;
        img.alt = "업로드된 이미지";
        dropZoneContent.appendChild(img);
    }

    function resetDropPreview() {
        dropZoneContent.innerHTML = `
        <strong>클릭하거나 이미지를 드래그하세요</strong>
        Ctrl+V로 붙여넣기 가능
      `;
    }

    function processImageFile(file) {
        if (!file || !file.type.startsWith("image/")) {
            showMessage(controlMessage, "이미지 파일만 업로드할 수 있습니다.", "error");
            return;
        }

        clearMessage(controlMessage);

        const reader = new FileReader();
        reader.onload = function (e) {
            uploadedImageUrl = e.target.result;
            uploadedImageName = (file.name || "favicon").replace(/\.[^.]+$/, "") || "favicon";

            const img = new Image();
            img.onload = function () {
                uploadedImage = img;
                updateDropPreviewImage(uploadedImageUrl);
                renderPreview();
                showMessage(controlMessage, "이미지가 업로드되었습니다.", "success");
            };
            img.onerror = function () {
                uploadedImage = null;
                uploadedImageUrl = "";
                showMessage(controlMessage, "이미지를 불러오지 못했습니다.", "error");
            };
            img.src = uploadedImageUrl;
        };
        reader.onerror = function () {
            showMessage(controlMessage, "이미지를 읽는 중 오류가 발생했습니다.", "error");
        };
        reader.readAsDataURL(file);
    }

    function createCanvas(size) {
        const canvas = document.createElement("canvas");
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext("2d");

        const radius = Number(radiusRange.value);
        const bg = bgColor.value;
        const fg = textColor.value;
        const text = escapeText(textInput.value);
        const fontSize = Number(fontSizeRange.value);

        ctx.clearRect(0, 0, size, size);

        drawRoundedRect(ctx, 0, 0, size, size, radius * (size / 128));
        ctx.fillStyle = bg;
        ctx.fill();

        if (uploadedImage) {
            ctx.save();
            drawRoundedRect(ctx, 0, 0, size, size, radius * (size / 128));
            ctx.clip();

            const cover = getCoverRect(uploadedImage.width, uploadedImage.height, size, size);
            ctx.drawImage(
                uploadedImage,
                cover.sx,
                cover.sy,
                cover.sw,
                cover.sh,
                0,
                0,
                size,
                size
            );
            ctx.restore();
        } else {
            ctx.fillStyle = fg;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.font = `900 ${fontSize * (size / 128)}px Apple SD Gothic Neo, Malgun Gothic, Noto Sans KR, sans-serif`;
            ctx.fillText(text, size / 2, size / 2 + size * 0.02);
        }

        return canvas;
    }

    function getCoverRect(imageW, imageH, boxW, boxH) {
        const imageRatio = imageW / imageH;
        const boxRatio = boxW / boxH;

        let sx = 0;
        let sy = 0;
        let sw = imageW;
        let sh = imageH;

        if (imageRatio > boxRatio) {
            sw = imageH * boxRatio;
            sx = (imageW - sw) / 2;
        } else {
            sh = imageW / boxRatio;
            sy = (imageH - sh) / 2;
        }

        return { sx, sy, sw, sh };
    }

    function drawRoundedRect(ctx, x, y, width, height, radius) {
        const r = Math.max(0, Math.min(radius, width / 2, height / 2));
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + width - r, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + r);
        ctx.lineTo(x + width, y + height - r);
        ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
        ctx.lineTo(x + r, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    function renderPreview() {
        syncRangeLabels();
        previewStage.innerHTML = "";

        const canvas = createCanvas(128);
        previewStage.style.borderRadius = `${radiusRange.value}px`;
        previewStage.appendChild(canvas);
        updateHtmlCode();
    }

    function updateHtmlCode() {
        htmlCode.value =
            `<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/favicon-180x180.png">
<link rel="manifest" href="/site.webmanifest">`;
    }

    function downloadCanvas(size) {
        const canvas = createCanvas(size);
        const link = document.createElement("a");
        link.href = canvas.toDataURL("image/png");
        link.download = `favicon-${size}x${size}.png`;
        document.body.appendChild(link);
        link.click();
        link.remove();
    }

    function downloadAllSizes() {
        SIZES.forEach((size, index) => {
            setTimeout(() => downloadCanvas(size), index * 150);
        });
        showMessage(controlMessage, "모든 크기 다운로드를 시작했습니다.", "success");
    }

    function resetAll() {
        uploadedImage = null;
        uploadedImageUrl = "";
        uploadedImageName = "favicon";
        fileInput.value = "";
        textInput.value = "A";
        bgColor.value = "#3b82f6";
        bgColorText.value = "#3b82f6";
        textColor.value = "#ffffff";
        textColorText.value = "#ffffff";
        fontSizeRange.value = 32;
        radiusRange.value = 8;
        resetDropPreview();
        clearMessage(controlMessage);
        clearMessage(codeMessage);
        renderPreview();
    }

    dropZone.addEventListener("click", () => fileInput.click());
    dropZone.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            fileInput.click();
        }
    });

    fileInput.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) processImageFile(file);
    });

    ["dragenter", "dragover"].forEach((eventName) => {
        dropZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.add("dragover");
        });
    });

    ["dragleave", "dragend", "drop"].forEach((eventName) => {
        dropZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.remove("dragover");
        });
    });

    dropZone.addEventListener("drop", (e) => {
        const file = e.dataTransfer.files && e.dataTransfer.files[0];
        if (file) processImageFile(file);
    });

    document.addEventListener("paste", (e) => {
        const items = e.clipboardData?.items || [];
        for (const item of items) {
            if (item.type && item.type.startsWith("image/")) {
                const file = item.getAsFile();
                if (file) {
                    processImageFile(file);
                    break;
                }
            }
        }
    });

    textInput.addEventListener("input", () => {
        textInput.value = escapeText(textInput.value);
        renderPreview();
    });

    bgColor.addEventListener("input", () => syncColorFromPicker(bgColor, bgColorText));
    textColor.addEventListener("input", () => syncColorFromPicker(textColor, textColorText));

    bgColorText.addEventListener("input", () => syncColorFromText(bgColorText, bgColor));
    textColorText.addEventListener("input", () => syncColorFromText(textColorText, textColor));

    fontSizeRange.addEventListener("input", renderPreview);
    radiusRange.addEventListener("input", renderPreview);

    sizeButtons.forEach((button) => {
        button.addEventListener("click", () => {
            const size = Number(button.dataset.size);
            downloadCanvas(size);
            showMessage(controlMessage, `${size}x${size} 파비콘을 다운로드했습니다.`, "success");
        });
    });

    downloadAllBtn.addEventListener("click", downloadAllSizes);
    clearBtn.addEventListener("click", resetAll);

    copyCodeBtn.addEventListener("click", async () => {
        try {
            await navigator.clipboard.writeText(htmlCode.value);
            showMessage(codeMessage, "HTML 코드를 복사했습니다.", "success");
        } catch (e) {
            htmlCode.select();
            document.execCommand("copy");
            showMessage(codeMessage, "HTML 코드를 복사했습니다.", "success");
        }
    });

    updateHtmlCode();
    renderPreview();
</script>
</body>
</html>
