<!-- 파일명 예시: dday-calculator.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D-Day 계산기</title>

    <style>
        :root{
            --bg:#ffffff;
            --panel:#ffffff;
            --soft:#f3f5f9;
            --border:#e9edf5;
            --text:#111827;
            --muted:#6b7280;

            --green:#3ad100;
            --greenSoft:rgba(58,209,0,.12);

            --gradA:#158BFF;
            --gradB:#2ED2B3;

            --gradC:#6D28D9;
            --gradD:#EA2E9F;

            --shadow:0 22px 48px rgba(16,24,40,.12);
            --shadow2:0 14px 26px rgba(16,24,40,.10);
            --radius:28px;
        }

        *{box-sizing:border-box}
        html,body{height:100%}
        body{
            margin:0;
            background:var(--bg);
            font-family:system-ui,-apple-system,"Noto Sans KR",sans-serif;
            color:var(--text);
        }

        .wrap{
            min-height:100%;
            display:flex;
            justify-content:center;
            padding:42px 16px 70px;
        }
        .container{ width:min(980px,100%); }

        h1{
            text-align:center;
            margin:0 0 22px;
            font-size:54px;
            font-weight:950;
            letter-spacing:-.7px;
        }

        .card{
            background:var(--panel);
            border-radius:34px;
            box-shadow:var(--shadow);
            border:1px solid rgba(0,0,0,.02);
            overflow:hidden;
            padding:28px 22px 26px;
        }

        /* Tabs */
        .tabs{
            display:flex;
            justify-content:center;
            gap:34px;
            padding:8px 0 16px;
            border-bottom:1px solid #eef2f7;
            margin-bottom:18px;
        }
        .tab{
            border:none;
            background:transparent;
            cursor:pointer;
            font-size:20px;
            font-weight:950;
            color:#111827;
            padding:10px 10px 14px;
            position:relative;
        }
        .tab.active{ color:var(--green); }
        .tab.active::after{
            content:"";
            position:absolute;
            left:0; right:0; bottom:-1px;
            height:3px;
            border-radius:999px;
            background:var(--green);
        }

        /* Sections */
        .section{ display:none; }
        .section.active{ display:block; }

        .label{
            font-weight:950;
            margin:6px 0 10px;
            color:#111827;
        }
        .row{
            display:flex;
            gap:14px;
            align-items:center;
            flex-wrap:wrap;
        }
        .input{
            width:100%;
            max-width:720px;
            border:2px solid #d7dde6;
            border-radius:12px;
            padding:14px 14px;
            font-size:18px;
            font-weight:900;
            outline:none;
            background:#fff;
        }
        .input:focus{
            border-color:rgba(58,209,0,.45);
            box-shadow:0 0 0 5px rgba(58,209,0,.10);
        }

        .btnWide{
            width:100%;
            border:none;
            cursor:pointer;
            border-radius:16px;
            padding:18px 14px;
            font-size:22px;
            font-weight:950;
            color:#fff;
            box-shadow:0 18px 34px rgba(16,24,40,.12);
            margin-top:14px;
        }
        .btnBlue{
            background:linear-gradient(90deg,var(--gradA),var(--gradB));
        }
        .btnPink{
            background:linear-gradient(90deg,var(--gradC),var(--gradD));
        }
        .btnWide:active{ transform:scale(.995); }

        /* after/before segmented */
        .segWrap{
            display:flex;
            align-items:stretch;
            gap:10px;
            width:100%;
            max-width:720px;
        }
        .daysInput{
            flex:1;
            border:2px solid #d7dde6;
            border-radius:12px;
            padding:14px 14px;
            font-size:18px;
            font-weight:900;
            outline:none;
            background:#fff;
        }
        .daysInput:focus{
            border-color:rgba(58,209,0,.45);
            box-shadow:0 0 0 5px rgba(58,209,0,.10);
        }
        .unitPill{
            width:54px;
            display:grid;
            place-items:center;
            border:2px solid #d7dde6;
            border-radius:12px;
            font-weight:950;
            color:#111827;
            background:#fff;
        }
        .seg{
            display:flex;
            border:2px solid #d7dde6;
            border-radius:12px;
            overflow:hidden;
            background:#fff;
        }
        .seg button{
            border:none;
            background:#fff;
            font-weight:950;
            font-size:16px;
            padding:0 18px;
            cursor:pointer;
        }
        .seg button.active{
            background:var(--green);
            color:#fff;
        }

        /* results */
        .blockTitle{
            display:flex;
            align-items:center;
            gap:10px;
            font-weight:950;
            margin:18px 0 12px;
            color:#111827;
        }
        .blockTitle .cal{font-size:18px}
        .table{
            width:100%;
            border:1px solid #eef2f7;
            border-radius:14px;
            overflow:hidden;
            box-shadow:var(--shadow2);
        }
        .rowItem{
            display:flex;
            justify-content:space-between;
            gap:14px;
            padding:14px 16px;
            background:#fff;
            border-bottom:1px solid #eef2f7;
            font-weight:900;
        }
        .rowItem:last-child{border-bottom:none}
        .left{ color:#111827; }
        .right{ color:#111827; }

        .note{
            margin-top:12px;
            text-align:right;
            font-size:13px;
            color:var(--muted);
            font-weight:900;
        }

        .bigResult{
            margin-top:14px;
            background:rgba(58,209,0,.08);
            border:1px solid rgba(58,209,0,.22);
            border-radius:14px;
            padding:14px 16px;
            font-weight:950;
            color:#14532d;
        }

        .toast{
            margin-top:10px;
            color:var(--muted);
            font-weight:900;
            min-height:22px;
        }
    </style>
</head>

<body>
<div class="wrap">
    <div class="container">
        <h1>D-Day 계산기</h1>

        <div class="card">
            <div class="tabs" role="tablist" aria-label="D-Day 탭">
                <button id="tabDday" class="tab active" type="button" role="tab" aria-selected="true">D-Day 찾기</button>
                <button id="tabCount" class="tab" type="button" role="tab" aria-selected="false">날짜수 계산</button>
            </div>

            <!-- D-Day 찾기 -->
            <section id="secDday" class="section active" aria-label="D-Day 찾기">
                <div class="label">목표 날짜 선택</div>
                <input id="targetDate" class="input" type="date" />

                <button id="btnCalcDday" class="btnWide btnBlue" type="button">계산하기</button>

                <div id="ddayResult" class="bigResult" style="display:none;"></div>

                <div class="blockTitle"><span class="cal">🗓️</span> 주요 기념일 모아보기</div>
                <div class="table" id="milestoneTable"></div>

                <div class="note">* 기준일을 1일로 포함하여 계산합니다.</div>
                <div id="toast1" class="toast"></div>
            </section>

            <!-- 날짜수 계산 -->
            <section id="secCount" class="section" aria-label="날짜수 계산">
                <div class="label">기준 날짜 선택</div>
                <input id="baseDate" class="input" type="date" />

                <div class="label" style="margin-top:14px;">며칠</div>
                <div class="segWrap">
                    <input id="daysN" class="daysInput" type="number" min="0" value="100" />
                    <div class="unitPill">일</div>
                    <div class="seg" role="group" aria-label="전후 선택">
                        <button id="btnAfter" class="active" type="button">후</button>
                        <button id="btnBefore" type="button">전</button>
                    </div>
                </div>

                <button id="btnCalcCount" class="btnWide btnPink" type="button">계산하기</button>

                <div id="countResult" class="bigResult" style="display:none;"></div>

                <div class="blockTitle"><span class="cal">🗓️</span> 주요 기념일 모아보기</div>
                <div class="table" id="milestoneTable2"></div>

                <div class="note">* 기준일을 1일로 포함하여 계산합니다.</div>
                <div id="toast2" class="toast"></div>
            </section>

        </div>
    </div>
</div>

<script>
    /* =========================================================
       D-Day Calculator
       - 탭 1: 목표 날짜로 D-Day(+/-) 계산 + 기념일(100/200/300/1주년/500/2주년/1000)
       - 탭 2: 기준 날짜 + N일 전/후 계산 + 동일 기념일 테이블
       - "기준일을 1일 포함" 옵션: + (N-1)일 로 계산
    ========================================================= */

    const $ = (id) => document.getElementById(id);

    const tabDday  = $("tabDday");
    const tabCount = $("tabCount");
    const secDday  = $("secDday");
    const secCount = $("secCount");

    const targetDate = $("targetDate");
    const baseDate   = $("baseDate");

    const btnCalcDday  = $("btnCalcDday");
    const btnCalcCount = $("btnCalcCount");

    const ddayResult  = $("ddayResult");
    const countResult = $("countResult");

    const milestoneTable  = $("milestoneTable");
    const milestoneTable2 = $("milestoneTable2");

    const toast1 = $("toast1");
    const toast2 = $("toast2");

    const daysN = $("daysN");
    const btnAfter = $("btnAfter");
    const btnBefore = $("btnBefore");

    let mode = "after"; // after | before

    // 주요 기념일
    const MILESTONES = [
        { label: "100일",  days: 100 },
        { label: "200일",  days: 200 },
        { label: "300일",  days: 300 },
        { label: "1주년",  years: 1 },
        { label: "500일",  days: 500 },
        { label: "2주년",  years: 2 },
        { label: "1000일", days: 1000 }
    ];

    function toKDateStr(d){
        const y = d.getFullYear();
        const m = String(d.getMonth()+1).padStart(2,"0");
        const day = String(d.getDate()).padStart(2,"0");
        return `${y}-${m}-${day}`;
    }
    function weekdayKR(d){
        const w = ["일","월","화","수","목","금","토"][d.getDay()];
        return w;
    }

    // 날짜는 local 기준 "정오"로 맞춰 DST/타임존 오차 줄이기
    function parseDateInput(val){
        if(!val) return null;
        const [y,m,d] = val.split("-").map(Number);
        return new Date(y, m-1, d, 12, 0, 0, 0);
    }

    function diffDays(from, to){
        // from -> to 일수 차이 (to - from) / day
        const ms = to - from;
        return Math.round(ms / 86400000);
    }

    function addDaysInclusive(base, n){
        // 기준일을 1일로 포함: N일은 + (N-1)일
        const d = new Date(base);
        d.setDate(d.getDate() + (n - 1));
        return d;
    }

    function addYearsInclusive(base, years){
        // "기준일 포함" 개념으로 주년은 '같은 날'이 1주년
        // 즉 +years year (그대로)
        const d = new Date(base);
        d.setFullYear(d.getFullYear() + years);
        return d;
    }

    function renderMilestones(base, tableEl){
        tableEl.innerHTML = "";
        MILESTONES.forEach(item=>{
            let date;
            if(item.days){
                date = addDaysInclusive(base, item.days);
            }else{
                date = addYearsInclusive(base, item.years);
            }
            const row = document.createElement("div");
            row.className = "rowItem";
            row.innerHTML = `
      <div class="left">${item.label}</div>
      <div class="right">${toKDateStr(date)} (${weekdayKR(date)})</div>
    `;
            tableEl.appendChild(row);
        });
    }

    function setTab(which){
        const isD = which === "dday";
        tabDday.classList.toggle("active", isD);
        tabCount.classList.toggle("active", !isD);
        tabDday.setAttribute("aria-selected", String(isD));
        tabCount.setAttribute("aria-selected", String(!isD));
        secDday.classList.toggle("active", isD);
        secCount.classList.toggle("active", !isD);
    }

    function setMode(next){
        mode = next;
        btnAfter.classList.toggle("active", mode==="after");
        btnBefore.classList.toggle("active", mode==="before");
    }

    /* ---------- 탭1: D-Day 찾기 ---------- */
    function calcDday(){
        toast1.textContent = "";
        const t = parseDateInput(targetDate.value);
        if(!t){
            toast1.textContent = "목표 날짜를 선택해 주세요.";
            ddayResult.style.display = "none";
            return;
        }

        const today = new Date();
        const base = new Date(today.getFullYear(), today.getMonth(), today.getDate(), 12, 0, 0, 0);

        // 기준일 포함 규칙:
        // - 목표가 미래면 D-n: (목표 - 오늘) 일수에서 0일이면 D-Day
        // - 목표가 과거면 D+ n: (오늘 - 목표) 일수
        const d = diffDays(base, t);
        let text = "";
        if(d === 0) text = "D-Day (오늘)";
        else if(d > 0) text = `D-${d}`;
        else text = `D+${Math.abs(d)}`;

        ddayResult.textContent = `${toKDateStr(t)} (${weekdayKR(t)}) → ${text}`;
        ddayResult.style.display = "block";

        // 기념일 테이블은 목표 날짜 기준으로(스크린샷 느낌)
        renderMilestones(t, milestoneTable);
    }

    /* ---------- 탭2: 날짜수 계산 ---------- */
    function calcCount(){
        toast2.textContent = "";
        const b = parseDateInput(baseDate.value);
        if(!b){
            toast2.textContent = "기준 날짜를 선택해 주세요.";
            countResult.style.display = "none";
            return;
        }

        const n = Math.max(0, Number(daysN.value || 0));
        if(n === 0){
            countResult.textContent = `${toKDateStr(b)} (${weekdayKR(b)})`;
            countResult.style.display = "block";
            renderMilestones(b, milestoneTable2);
            return;
        }

        // "기준일 포함" 규칙:
        // - 후: 기준일을 1일로 포함한 N일 뒤 = + (N-1)
        // - 전: 기준일을 1일로 포함한 N일 전 = - (N-1)
        const offset = n - 1;
        const out = new Date(b);
        out.setDate(out.getDate() + (mode==="after" ? offset : -offset));

        const label = (mode==="after") ? `${n}일 후` : `${n}일 전`;
        countResult.textContent = `${toKDateStr(b)} 기준 ${label} → ${toKDateStr(out)} (${weekdayKR(out)})`;
        countResult.style.display = "block";

        renderMilestones(b, milestoneTable2);
    }

    /* ---------- events ---------- */
    tabDday.addEventListener("click", ()=>setTab("dday"));
    tabCount.addEventListener("click", ()=>setTab("count"));

    btnCalcDday.addEventListener("click", calcDday);
    btnCalcCount.addEventListener("click", calcCount);

    btnAfter.addEventListener("click", ()=>setMode("after"));
    btnBefore.addEventListener("click", ()=>setMode("before"));

    /* ---------- init ---------- */
    (function init(){
        // 기본값: 오늘
        const now = new Date();
        const todayStr = toKDateStr(new Date(now.getFullYear(), now.getMonth(), now.getDate(), 12, 0, 0, 0));
        targetDate.value = todayStr;
        baseDate.value = todayStr;

        // 초기 테이블: 오늘 기준으로 미리 보여주기(스크린샷 느낌)
        const base = parseDateInput(todayStr);
        renderMilestones(base, milestoneTable);
        renderMilestones(base, milestoneTable2);

        setMode("after");
    })();
</script>

</body>
</html>
