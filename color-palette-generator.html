<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>컬러 팔레트 생성기</title>
    <meta
            name="description"
            content="기본 색상을 기준으로 보색, 유사색, 삼원색, 분할보색, 사원색, 단색조 팔레트를 생성하는 도구입니다."
    />
    <style>
        :root {
            --bg: #f5f7fb;
            --card: #ffffff;
            --soft: #f8fafc;
            --line: #e5e7eb;
            --text: #111827;
            --muted: #6b7280;
            --primary: #111827;
            --primary-hover: #1f2937;
            --accent: #2563eb;
            --accent-soft: #dbeafe;
            --success: #16a34a;
            --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            background: linear-gradient(180deg, #f9fbff 0%, #f3f6fb 100%);
            color: var(--text);
            font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
        }

        body {
            min-height: 100vh;
        }

        .wrap {
            max-width: 1320px;
            margin: 0 auto;
            padding: 28px 18px 56px;
        }

        .page-header {
            margin-bottom: 20px;
        }

        .page-title {
            margin: 0 0 8px;
            font-size: 42px;
            line-height: 1.2;
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        .page-desc {
            margin: 0;
            font-size: 18px;
            line-height: 1.7;
            color: var(--muted);
        }

        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px;
            margin-top: 18px;
        }

        .section-title {
            margin: 0 0 20px;
            font-size: 22px;
            font-weight: 800;
            line-height: 1.3;
        }

        .field {
            margin-bottom: 18px;
        }

        .label {
            display: block;
            margin-bottom: 10px;
            font-size: 17px;
            font-weight: 800;
        }

        .color-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .color-picker {
            width: 76px;
            height: 46px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            background: #fff;
            padding: 4px;
            cursor: pointer;
        }

        .hex-input {
            width: 150px;
            height: 46px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            background: #fff;
            color: var(--text);
            padding: 0 14px;
            outline: none;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
        }

        .hex-input:focus {
            border-color: #94a3b8;
            box-shadow: 0 0 0 5px rgba(148, 163, 184, 0.15);
        }

        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .btn {
            appearance: none;
            border: none;
            cursor: pointer;
            border-radius: 14px;
            padding: 13px 18px;
            font-size: 15px;
            font-weight: 800;
            transition: all 0.18s ease;
            font-family: inherit;
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 10px 20px rgba(17, 24, 39, 0.14);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-light {
            background: #f3f4f6;
            color: var(--text);
            border: 1px solid var(--line);
        }

        .btn-light:hover {
            background: #e5e7eb;
        }

        .btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .palette-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 16px;
            align-items: start;
        }

        .color-card {
            cursor: pointer;
            user-select: none;
            transition: transform 0.15s ease;
        }

        .color-card:hover {
            transform: translateY(-2px);
        }

        .swatch {
            height: 150px;
            border-radius: 18px;
            border: 1px solid rgba(0,0,0,0.06);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
        }

        .color-code {
            text-align: center;
            margin-top: 12px;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 0.02em;
        }

        .palette-help {
            margin-top: 18px;
            text-align: center;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.7;
        }

        .info-list {
            margin: 0;
            padding-left: 22px;
            color: var(--muted);
            font-size: 17px;
            line-height: 2;
        }

        .message {
            display: none;
            margin-top: 16px;
            padding: 14px 16px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 700;
            line-height: 1.6;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #ecfdf5;
            border: 1px solid #bbf7d0;
            color: #166534;
        }

        .message.error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
        }

        @media (max-width: 900px) {
            .wrap {
                padding: 22px 14px 42px;
            }

            .page-title {
                font-size: 34px;
            }

            .page-desc {
                font-size: 16px;
            }

            .card {
                padding: 22px 16px;
            }

            .palette-grid {
                grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            }
        }

        @media (max-width: 520px) {
            .page-title {
                font-size: 30px;
            }

            .color-row {
                align-items: stretch;
            }

            .hex-input {
                width: 100%;
            }

            .btn-row {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .swatch {
                height: 120px;
            }
        }
    </style>
</head>
<body>
<main class="wrap">
    <header class="page-header">
        <h1 class="page-title">컬러 팔레트</h1>
        <p class="page-desc">조화로운 색상 팔레트를 생성합니다.</p>
    </header>

    <section class="card">
        <h2 class="section-title">기본 색상</h2>

        <div class="field">
            <label class="label" for="baseColor">색상 선택</label>
            <div class="color-row">
                <input id="baseColor" class="color-picker" type="color" value="#fd0e5e" />
                <input id="hexInput" class="hex-input" type="text" value="#fd0e5e" />
                <button id="randomBtn" class="btn btn-light" type="button">랜덤</button>
            </div>
        </div>

        <div class="btn-row" id="modeButtons">
            <button class="btn btn-light active" data-mode="complementary" type="button">보색</button>
            <button class="btn btn-light" data-mode="analogous" type="button">유사색</button>
            <button class="btn btn-light" data-mode="triadic" type="button">삼원색</button>
            <button class="btn btn-light" data-mode="split" type="button">분할보색</button>
            <button class="btn btn-light" data-mode="tetradic" type="button">사원색</button>
            <button class="btn btn-light" data-mode="monochrome" type="button">단색조</button>
        </div>

        <div id="messageBox" class="message"></div>
    </section>

    <section class="card">
        <h2 class="section-title">팔레트</h2>
        <div id="paletteGrid" class="palette-grid"></div>
        <div class="palette-help">클릭하여 색상 코드 복사</div>
    </section>

    <section class="card">
        <h2 class="section-title">색상 조합 설명</h2>
        <ul class="info-list">
            <li><strong>보색</strong>: 색상환에서 반대편에 위치한 색상</li>
            <li><strong>유사색</strong>: 색상환에서 인접한 색상</li>
            <li><strong>삼원색</strong>: 색상환에서 120도 간격의 세 색상</li>
            <li><strong>분할보색</strong>: 보색의 양옆 색상</li>
            <li><strong>사원색</strong>: 색상환에서 균형 잡힌 네 색상</li>
            <li><strong>단색조</strong>: 같은 색조의 밝기/채도 변형</li>
        </ul>
    </section>
</main>

<script>
    const baseColorInput = document.getElementById("baseColor");
    const hexInput = document.getElementById("hexInput");
    const randomBtn = document.getElementById("randomBtn");
    const modeButtons = document.getElementById("modeButtons");
    const paletteGrid = document.getElementById("paletteGrid");
    const messageBox = document.getElementById("messageBox");

    let currentMode = "complementary";

    function showMessage(text, type = "success") {
        messageBox.textContent = text;
        messageBox.className = `message show ${type}`;
        clearTimeout(showMessage._timer);
        showMessage._timer = setTimeout(() => {
            messageBox.className = "message";
            messageBox.textContent = "";
        }, 1400);
    }

    function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
    }

    function normalizeHex(value) {
        let hex = String(value).trim().replace(/^#/, "");

        if (hex.length === 3) {
            hex = hex.split("").map((ch) => ch + ch).join("");
        }

        if (!/^[0-9a-fA-F]{6}$/.test(hex)) {
            return null;
        }

        return "#" + hex.toLowerCase();
    }

    function randomHex() {
        const n = Math.floor(Math.random() * 0xffffff);
        return "#" + n.toString(16).padStart(6, "0");
    }

    function hexToRgb(hex) {
        const clean = normalizeHex(hex);
        if (!clean) return null;

        const raw = clean.slice(1);
        return {
            r: parseInt(raw.slice(0, 2), 16),
            g: parseInt(raw.slice(2, 4), 16),
            b: parseInt(raw.slice(4, 6), 16)
        };
    }

    function rgbToHex(r, g, b) {
        return (
            "#" +
            clamp(Math.round(r), 0, 255).toString(16).padStart(2, "0") +
            clamp(Math.round(g), 0, 255).toString(16).padStart(2, "0") +
            clamp(Math.round(b), 0, 255).toString(16).padStart(2, "0")
        );
    }

    function rgbToHsl(r, g, b) {
        r /= 255;
        g /= 255;
        b /= 255;

        const max = Math.max(r, g, b);
        const min = Math.min(r, g, b);
        let h = 0;
        let s = 0;
        const l = (max + min) / 2;

        if (max !== min) {
            const d = max - min;
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min);

            switch (max) {
                case r:
                    h = (g - b) / d + (g < b ? 6 : 0);
                    break;
                case g:
                    h = (b - r) / d + 2;
                    break;
                default:
                    h = (r - g) / d + 4;
            }

            h /= 6;
        }

        return {
            h: Math.round(h * 360),
            s: Math.round(s * 100),
            l: Math.round(l * 100)
        };
    }

    function hslToRgb(h, s, l) {
        h = ((Number(h) % 360) + 360) % 360;
        s = clamp(Number(s), 0, 100) / 100;
        l = clamp(Number(l), 0, 100) / 100;

        const c = (1 - Math.abs(2 * l - 1)) * s;
        const x = c * (1 - Math.abs((h / 60) % 2 - 1));
        const m = l - c / 2;

        let r1 = 0;
        let g1 = 0;
        let b1 = 0;

        if (h < 60) {
            r1 = c; g1 = x; b1 = 0;
        } else if (h < 120) {
            r1 = x; g1 = c; b1 = 0;
        } else if (h < 180) {
            r1 = 0; g1 = c; b1 = x;
        } else if (h < 240) {
            r1 = 0; g1 = x; b1 = c;
        } else if (h < 300) {
            r1 = x; g1 = 0; b1 = c;
        } else {
            r1 = c; g1 = 0; b1 = x;
        }

        return {
            r: Math.round((r1 + m) * 255),
            g: Math.round((g1 + m) * 255),
            b: Math.round((b1 + m) * 255)
        };
    }

    function hslToHex(h, s, l) {
        const rgb = hslToRgb(h, s, l);
        return rgbToHex(rgb.r, rgb.g, rgb.b);
    }

    function getPalette(hex, mode) {
        const rgb = hexToRgb(hex);
        if (!rgb) return [];

        const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
        const h = hsl.h;
        const s = hsl.s;
        const l = hsl.l;

        switch (mode) {
            case "complementary":
                return [hslToHex(h, s, l), hslToHex(h + 180, s, l)];

            case "analogous":
                return [
                    hslToHex(h - 30, s, l),
                    hslToHex(h, s, l),
                    hslToHex(h + 30, s, l)
                ];

            case "triadic":
                return [
                    hslToHex(h, s, l),
                    hslToHex(h + 120, s, l),
                    hslToHex(h + 240, s, l)
                ];

            case "split":
                return [
                    hslToHex(h, s, l),
                    hslToHex(h + 150, s, l),
                    hslToHex(h + 210, s, l)
                ];

            case "tetradic":
                return [
                    hslToHex(h, s, l),
                    hslToHex(h + 90, s, l),
                    hslToHex(h + 180, s, l),
                    hslToHex(h + 270, s, l)
                ];

            case "monochrome":
                return [
                    hslToHex(h, clamp(s, 20, 100), 25),
                    hslToHex(h, clamp(s, 20, 100), 40),
                    hslToHex(h, clamp(s, 20, 100), 55),
                    hslToHex(h, clamp(s, 20, 100), 70),
                    hslToHex(h, clamp(s, 20, 100), 85)
                ];

            default:
                return [hex];
        }
    }

    async function copyText(text) {
        try {
            await navigator.clipboard.writeText(text);
            showMessage(`${text.toUpperCase()} 복사됨`);
        } catch (e) {
            showMessage("복사하지 못했습니다.", "error");
        }
    }

    function renderPalette() {
        const hex = normalizeHex(hexInput.value || baseColorInput.value) || "#fd0e5e";
        baseColorInput.value = hex;
        hexInput.value = hex;

        const colors = getPalette(hex, currentMode);
        paletteGrid.innerHTML = "";

        colors.forEach((color) => {
            const card = document.createElement("div");
            card.className = "color-card";
            card.addEventListener("click", () => copyText(color.toUpperCase()));

            const swatch = document.createElement("div");
            swatch.className = "swatch";
            swatch.style.backgroundColor = color;

            const code = document.createElement("div");
            code.className = "color-code";
            code.textContent = color.toUpperCase();

            card.appendChild(swatch);
            card.appendChild(code);
            paletteGrid.appendChild(card);
        });
    }

    baseColorInput.addEventListener("input", () => {
        hexInput.value = baseColorInput.value;
        renderPalette();
    });

    hexInput.addEventListener("input", () => {
        const normalized = normalizeHex(hexInput.value);
        if (normalized) {
            baseColorInput.value = normalized;
            renderPalette();
        }
    });

    hexInput.addEventListener("blur", () => {
        const normalized = normalizeHex(hexInput.value);
        if (normalized) {
            hexInput.value = normalized;
            baseColorInput.value = normalized;
        } else {
            hexInput.value = baseColorInput.value;
        }
        renderPalette();
    });

    randomBtn.addEventListener("click", () => {
        const hex = randomHex();
        baseColorInput.value = hex;
        hexInput.value = hex;
        renderPalette();
    });

    modeButtons.addEventListener("click", (e) => {
        const btn = e.target.closest("[data-mode]");
        if (!btn) return;

        currentMode = btn.dataset.mode;

        document.querySelectorAll("[data-mode]").forEach((button) => {
            button.classList.toggle("active", button === btn);
        });

        renderPalette();
    });

    renderPalette();
</script>
</body>
</html>
