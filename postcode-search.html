<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>우편번호 검색기</title>
    <meta
            name="description"
            content="주소를 검색하여 우편번호, 도로명주소, 지번주소, 행정동코드 등을 조회하는 우편번호 검색기입니다."
    />

    <style>
        :root {
            --bg: #f5f7fb;
            --card: #ffffff;
            --soft: #f8fafc;
            --line: #e5e7eb;
            --text: #111827;
            --muted: #6b7280;
            --primary: #111827;
            --primary-hover: #1f2937;
            --accent: #2563eb;
            --accent-soft: #dbeafe;
            --success: #16a34a;
            --danger: #ef4444;
            --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            background: linear-gradient(180deg, #f9fbff 0%, #f3f6fb 100%);
            color: var(--text);
            font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
        }

        body {
            min-height: 100vh;
        }

        .wrap {
            max-width: 1340px;
            margin: 0 auto;
            padding: 28px 18px 56px;
        }

        .page-header {
            margin-bottom: 24px;
        }

        .page-title {
            margin: 0 0 10px;
            font-size: 42px;
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: -0.03em;
        }

        .page-desc {
            margin: 0;
            color: var(--muted);
            font-size: 18px;
            line-height: 1.7;
        }

        .icon-inline {
            margin-right: 10px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px;
            margin-top: 22px;
        }

        .search-hero {
            min-height: 210px;
            display: flex;
            align-items: center;
        }

        .search-row {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
            width: 100%;
        }

        .search-btn {
            appearance: none;
            border: none;
            cursor: pointer;
            border-radius: 18px;
            padding: 18px 28px;
            font-size: 20px;
            font-weight: 800;
            background: var(--primary);
            color: #fff;
            box-shadow: 0 12px 24px rgba(17, 24, 39, 0.14);
            transition: all 0.18s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: inherit;
        }

        .search-btn:hover {
            background: var(--primary-hover);
        }

        .search-btn:active,
        .copy-btn:active,
        .history-remove-btn:active,
        .history-clear-btn:active,
        .close-result-btn:active {
            transform: translateY(1px);
        }

        .search-hint {
            color: var(--muted);
            font-size: 18px;
            line-height: 1.7;
        }

        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 20px;
        }

        .section-title {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
            line-height: 1.3;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 34px;
            padding: 6px 12px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 15px;
            font-weight: 800;
        }

        .close-result-btn,
        .history-clear-btn {
            appearance: none;
            border: none;
            background: transparent;
            color: var(--muted);
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            padding: 8px 10px;
            border-radius: 10px;
            transition: background-color 0.15s ease, color 0.15s ease;
            font-family: inherit;
        }

        .close-result-btn:hover,
        .history-clear-btn:hover {
            background: #f3f4f6;
            color: var(--text);
        }

        .result-card {
            display: none;
        }

        .result-card.show {
            display: block;
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            align-items: start;
        }

        .result-col-title {
            margin: 0 0 14px;
            font-size: 20px;
            font-weight: 800;
            color: var(--text);
        }

        .result-list {
            display: flex;
            flex-direction: column;
            gap: 0;
            border-top: 1px solid var(--line);
        }

        .result-item {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 14px;
            padding: 14px 0;
            border-bottom: 1px solid var(--line);
        }

        .result-key {
            margin: 0 0 6px;
            color: var(--muted);
            font-size: 15px;
            font-weight: 700;
            line-height: 1.5;
        }

        .result-value {
            font-size: 16px;
            font-weight: 800;
            line-height: 1.6;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .copy-btn {
            appearance: none;
            border: none;
            background: transparent;
            color: var(--accent);
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            padding: 8px 10px;
            border-radius: 10px;
            font-family: inherit;
            transition: background-color 0.15s ease;
            align-self: center;
        }

        .copy-btn:hover {
            background: #eff6ff;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .history-empty {
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--muted);
            font-size: 17px;
            line-height: 1.8;
            border: 1px dashed var(--line);
            border-radius: 18px;
            background: #fbfcfe;
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 16px 18px;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: #fbfcfe;
        }

        .history-main {
            min-width: 0;
            flex: 1;
            cursor: pointer;
        }

        .history-top {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 6px;
        }

        .history-postcode {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 30px;
            padding: 4px 10px;
            border-radius: 999px;
            background: #eef2ff;
            color: #3730a3;
            font-size: 14px;
            font-weight: 800;
        }

        .history-building {
            color: var(--muted);
            font-size: 14px;
            font-weight: 700;
            line-height: 1.6;
        }

        .history-address {
            font-size: 15px;
            font-weight: 800;
            line-height: 1.6;
            word-break: break-word;
        }

        .history-remove-btn {
            appearance: none;
            border: none;
            background: transparent;
            color: var(--muted);
            font-size: 18px;
            cursor: pointer;
            padding: 10px;
            border-radius: 10px;
            font-family: inherit;
            transition: background-color 0.15s ease, color 0.15s ease;
        }

        .history-remove-btn:hover {
            background: #f3f4f6;
            color: var(--text);
        }

        .tips-list {
            margin: 0;
            padding-left: 22px;
            color: var(--muted);
            font-size: 16px;
            line-height: 2;
        }

        .message {
            display: none;
            margin-top: 16px;
            padding: 14px 16px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 700;
            line-height: 1.6;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #ecfdf5;
            border: 1px solid #bbf7d0;
            color: #166534;
        }

        .message.error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
        }

        @media (max-width: 1100px) {
            .result-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 900px) {
            .wrap {
                padding: 22px 14px 42px;
            }

            .page-title {
                font-size: 34px;
            }

            .page-desc,
            .search-hint {
                font-size: 16px;
            }

            .card {
                padding: 22px 16px;
            }

            .section-title {
                font-size: 24px;
            }

            .search-btn {
                font-size: 18px;
                padding: 16px 22px;
            }
        }

        @media (max-width: 640px) {
            .page-title {
                font-size: 30px;
            }

            .search-row {
                align-items: flex-start;
            }

            .search-btn {
                width: 100%;
            }

            .history-item {
                align-items: flex-start;
            }

            .result-item {
                grid-template-columns: 1fr;
            }

            .copy-btn {
                justify-self: start;
                padding-left: 0;
            }
        }
    </style>
</head>
<body>
<main class="wrap">
    <header class="page-header">
        <h1 class="page-title"><span class="icon-inline">◎</span>우편번호 검색기</h1>
        <p class="page-desc">
            주소를 검색하여 우편번호, 도로명주소, 지번주소, 행정동코드 등을 조회합니다.
        </p>
    </header>

    <section class="card search-hero">
        <div class="search-row">
            <button id="searchAddressBtn" class="search-btn" type="button">
                <span>⌕</span>
                <span>주소 검색하기</span>
            </button>
            <div class="search-hint">도로명, 건물명, 지번으로 검색할 수 있습니다.</div>
        </div>
    </section>

    <section id="resultCard" class="card result-card">
        <div class="section-head">
            <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
                <h2 class="section-title" style="margin:0;">검색 결과</h2>
                <span id="resultPostcodeBadge" class="badge"></span>
            </div>
            <button id="closeResultBtn" class="close-result-btn" type="button">닫기</button>
        </div>

        <div class="result-grid">
            <div>
                <h3 class="result-col-title">주소 정보</h3>
                <div class="result-list" id="addressInfoList"></div>
            </div>

            <div>
                <h3 class="result-col-title">코드 정보</h3>
                <div class="result-list" id="codeInfoList"></div>
            </div>
        </div>

        <div id="resultMessage" class="message"></div>
    </section>

    <section class="card">
        <div class="section-head">
            <h2 class="section-title" style="margin:0;">검색 기록</h2>
            <button id="clearHistoryBtn" class="history-clear-btn" type="button">전체 삭제</button>
        </div>

        <div id="historyList" class="history-list"></div>
    </section>

    <section class="card">
        <h2 class="section-title">사용 팁</h2>
        <ul class="tips-list">
            <li>도로명, 건물명, 지번 등으로 검색할 수 있습니다.</li>
            <li>검색 결과에서 각 항목을 클릭하면 클립보드에 복사됩니다.</li>
            <li>법정동코드는 법정동을 식별하는 코드입니다.</li>
            <li>시군구코드는 시/군/구를 식별하는 코드입니다.</li>
            <li>건물관리번호는 건물을 식별하는 번호입니다.</li>
            <li>검색 기록은 브라우저에 자동 저장됩니다.</li>
        </ul>
    </section>
</main>

<script src="//t1.kakaocdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script>
    const STORAGE_KEY = "postcode_search_history_v1";

    const searchAddressBtn = document.getElementById("searchAddressBtn");
    const resultCard = document.getElementById("resultCard");
    const resultPostcodeBadge = document.getElementById("resultPostcodeBadge");
    const addressInfoList = document.getElementById("addressInfoList");
    const codeInfoList = document.getElementById("codeInfoList");
    const resultMessage = document.getElementById("resultMessage");
    const closeResultBtn = document.getElementById("closeResultBtn");
    const historyList = document.getElementById("historyList");
    const clearHistoryBtn = document.getElementById("clearHistoryBtn");

    let currentResult = null;
    let historyItems = loadHistory();

    function showMessage(target, text, type) {
        target.textContent = text;
        target.className = `message show ${type}`;
        clearTimeout(target._timer);
        target._timer = setTimeout(() => {
            target.className = "message";
            target.textContent = "";
        }, 1500);
    }

    function copyText(text) {
        return navigator.clipboard.writeText(text);
    }

    function safeValue(value) {
        if (value === undefined || value === null || value === "") return "-";
        return String(value);
    }

    function createResultItem(label, value) {
        const item = document.createElement("div");
        item.className = "result-item";

        const left = document.createElement("div");

        const key = document.createElement("div");
        key.className = "result-key";
        key.textContent = label;

        const val = document.createElement("div");
        val.className = "result-value";
        val.textContent = safeValue(value);

        left.appendChild(key);
        left.appendChild(val);

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "copy-btn";
        btn.textContent = "복사";
        btn.addEventListener("click", async () => {
            try {
                await copyText(safeValue(value));
                showMessage(resultMessage, `${label}을(를) 복사했습니다.`, "success");
            } catch (e) {
                showMessage(resultMessage, "복사하지 못했습니다.", "error");
            }
        });

        item.appendChild(left);
        item.appendChild(btn);

        return item;
    }

    function renderResult(data) {
        currentResult = data;
        resultCard.classList.add("show");
        resultPostcodeBadge.textContent = safeValue(data.zonecode);
        addressInfoList.innerHTML = "";
        codeInfoList.innerHTML = "";

        const addressItems = [
            ["우편번호", data.zonecode],
            ["도로명주소", data.roadAddress],
            ["지번주소", data.jibunAddress],
            ["영문주소", data.addressEnglish],
            ["건물명", data.buildingName]
        ];

        const codeItems = [
            ["법정동코드", data.bcode],
            ["시군구코드", data.sigunguCode],
            ["건물관리번호", data.buildingCode],
            ["도로명코드", data.roadnameCode],
            ["행정동", data.hname],
            ["법정동", data.bname]
        ];

        addressItems.forEach(([label, value]) => {
            addressInfoList.appendChild(createResultItem(label, value));
        });

        codeItems.forEach(([label, value]) => {
            codeInfoList.appendChild(createResultItem(label, value));
        });

        window.scrollTo({
            top: resultCard.offsetTop - 20,
            behavior: "smooth"
        });
    }

    function openPostcodeSearch() {
        new kakao.Postcode({
            oncomplete: function (data) {
                renderResult(data);
                addHistory(data);
            }
        }).open();
    }

    function loadHistory() {
        try {
            const saved = localStorage.getItem(STORAGE_KEY);
            return saved ? JSON.parse(saved) : [];
        } catch (e) {
            return [];
        }
    }

    function saveHistory() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(historyItems));
    }

    function addHistory(data) {
        const item = {
            id: Date.now(),
            zonecode: safeValue(data.zonecode),
            roadAddress: safeValue(data.roadAddress),
            jibunAddress: safeValue(data.jibunAddress),
            addressEnglish: safeValue(data.addressEnglish),
            buildingName: safeValue(data.buildingName),
            bcode: safeValue(data.bcode),
            sigunguCode: safeValue(data.sigunguCode),
            buildingCode: safeValue(data.buildingCode),
            roadnameCode: safeValue(data.roadnameCode),
            hname: safeValue(data.hname),
            bname: safeValue(data.bname)
        };

        historyItems = historyItems.filter((entry) => {
            return !(
                entry.zonecode === item.zonecode &&
                entry.roadAddress === item.roadAddress &&
                entry.buildingName === item.buildingName
            );
        });

        historyItems.unshift(item);
        historyItems = historyItems.slice(0, 20);
        saveHistory();
        renderHistory();
    }

    function removeHistory(id) {
        historyItems = historyItems.filter((item) => item.id !== id);
        saveHistory();
        renderHistory();
    }

    function clearHistory() {
        historyItems = [];
        saveHistory();
        renderHistory();
    }

    function renderHistory() {
        if (!historyItems.length) {
            historyList.innerHTML = `<div class="history-empty">저장된 검색 기록이 없습니다</div>`;
            return;
        }

        historyList.innerHTML = "";

        historyItems.forEach((item) => {
            const row = document.createElement("div");
            row.className = "history-item";

            const main = document.createElement("div");
            main.className = "history-main";
            main.addEventListener("click", () => {
                renderResult(item);
            });

            const top = document.createElement("div");
            top.className = "history-top";

            const postcode = document.createElement("span");
            postcode.className = "history-postcode";
            postcode.textContent = item.zonecode;

            const building = document.createElement("span");
            building.className = "history-building";
            building.textContent = item.buildingName && item.buildingName !== "-" ? item.buildingName : "건물명 없음";

            top.appendChild(postcode);
            top.appendChild(building);

            const address = document.createElement("div");
            address.className = "history-address";
            address.textContent = item.roadAddress && item.roadAddress !== "-" ? item.roadAddress : item.jibunAddress;

            main.appendChild(top);
            main.appendChild(address);

            const removeBtn = document.createElement("button");
            removeBtn.type = "button";
            removeBtn.className = "history-remove-btn";
            removeBtn.textContent = "×";
            removeBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                removeHistory(item.id);
            });

            row.appendChild(main);
            row.appendChild(removeBtn);

            historyList.appendChild(row);
        });
    }

    searchAddressBtn.addEventListener("click", openPostcodeSearch);

    closeResultBtn.addEventListener("click", () => {
        resultCard.classList.remove("show");
    });

    clearHistoryBtn.addEventListener("click", () => {
        clearHistory();
    });

    renderHistory();
</script>
</body>
</html>
