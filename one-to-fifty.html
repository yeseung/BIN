<!-- 파일명 예시: one-to-fifty.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1 to 50 게임</title>

    <style>
        :root{
            --bg:#ffffff;
            --panel:#ffffff;
            --soft:#f3f5f9;
            --tile:#f3f4f6;
            --tileBorder:#d9dee7;

            --text:#111827;
            --muted:#6b7280;

            --blue:#1d9bf0;
            --red:#ff4a4a;

            --shadow:0 22px 48px rgba(16,24,40,.12);
            --shadow2:0 14px 26px rgba(16,24,40,.10);

            --radius:28px;
        }

        *{box-sizing:border-box}
        html,body{height:100%}
        body{
            margin:0;
            background:var(--bg);
            font-family:system-ui,-apple-system,"Noto Sans KR",sans-serif;
            color:var(--text);
        }

        .wrap{
            min-height:100%;
            display:flex;
            align-items:flex-start;
            justify-content:center;
            padding:42px 16px 70px;
        }
        .container{ width:min(980px,100%); }

        h1{
            text-align:center;
            margin:0 0 22px;
            font-size:54px;
            font-weight:950;
            letter-spacing:-.7px;
        }

        /* Top status row */
        .topRow{
            display:grid;
            grid-template-columns: 1fr 1fr 1fr;
            align-items:center;
            gap:12px;
            margin-bottom:18px;
        }
        @media (max-width:720px){
            .topRow{grid-template-columns:1fr; text-align:center}
        }

        .targetBox{
            justify-self:start;
        }
        .targetLabel{
            font-weight:950;
            color:var(--muted);
            margin-bottom:6px;
        }
        .targetNum{
            font-size:44px;
            font-weight:950;
            color:var(--blue);
            line-height:1;
        }

        .timerBox{
            justify-self:center;
            font-size:64px;
            font-weight:950;
            color:var(--red);
            letter-spacing:2px;
            font-variant-numeric:tabular-nums;
        }

        .resetBox{
            justify-self:end;
        }
        .resetBtn{
            width:56px;height:56px;
            border-radius:14px;
            border:2px solid #d7dde6;
            background:#fff;
            cursor:pointer;
            font-size:22px;
            box-shadow:0 12px 18px rgba(16,24,40,.08);
        }
        .resetBtn:active{transform:scale(.99)}

        /* Board */
        .card{
            background:var(--panel);
            border-radius:34px;
            box-shadow:var(--shadow);
            border:1px solid rgba(0,0,0,.02);
            overflow:hidden;
        }

        .boardWrap{
            padding:34px 18px 22px;
            display:flex;
            justify-content:center;
        }

        .board{
            width:min(560px, 100%);
            background:#fff;
            border-radius:24px;
            padding:22px;
            box-shadow:var(--shadow2);
            border:1px solid #eef2f7;
        }

        .grid{
            display:grid;
            grid-template-columns: repeat(5, 1fr);
            gap:14px;
        }

        .tile{
            height:92px;
            border-radius:14px;
            background:var(--tile);
            border:2px solid var(--tileBorder);
            display:grid;
            place-items:center;
            font-size:40px;
            font-weight:950;
            color:#111827;
            cursor:pointer;
            user-select:none;
            transition:transform .06s, filter .12s, opacity .12s;
        }
        .tile:active{transform:scale(.99)}
        .tile.disabled{
            cursor:default;
            opacity:.45;
            filter:grayscale(.2);
        }
        .tile.correct{
            border-color:rgba(29,155,240,.55);
            box-shadow:0 0 0 6px rgba(29,155,240,.10);
        }

        .hint{
            text-align:center;
            padding:14px 18px 28px;
            color:var(--muted);
            font-weight:900;
        }

        .toast{
            text-align:center;
            color:var(--muted);
            font-weight:900;
            min-height:22px;
            margin-top:-10px;
            padding-bottom:18px;
        }
    </style>
</head>

<body>
<div class="wrap">
    <div class="container">

        <h1>1 to 50 게임</h1>

        <div class="topRow">
            <div class="targetBox">
                <div class="targetLabel">Target</div>
                <div id="targetNum" class="targetNum">1</div>
            </div>

            <div id="timer" class="timerBox">0.00</div>

            <div class="resetBox">
                <button id="btnReset" class="resetBtn" type="button" aria-label="리셋">↻</button>
            </div>
        </div>

        <div class="card">
            <div class="boardWrap">
                <div class="board">
                    <div id="grid" class="grid" aria-label="1부터 50까지 숫자 보드"></div>
                </div>
            </div>
            <div class="hint">숫자 '1'을 누르면 시작합니다!</div>
            <div id="toast" class="toast"></div>
        </div>

    </div>
</div>

<script>
    /* =========================================================
       1 to 50 (Classic)
       - 5x5 보드
       - 1~25 랜덤 배치
       - 1~25를 누르면 해당 칸이 26~50으로 바뀜
       - 26~50까지 모두 누르면 종료
       - 타이머: 1을 누르는 순간 시작
    ========================================================= */

    const $ = (id) => document.getElementById(id);

    const gridEl = $("grid");
    const targetEl = $("targetNum");
    const timerEl = $("timer");
    const toastEl = $("toast");
    const btnReset = $("btnReset");

    let target = 1;
    let started = false;
    let startTime = 0;
    let rafId = null;

    let tiles = []; // {el, value}

    /* ---------- utils ---------- */
    function shuffle(arr){
        for(let i=arr.length-1; i>0; i--){
            const j = Math.floor(Math.random()*(i+1));
            [arr[i],arr[j]] = [arr[j],arr[i]];
        }
        return arr;
    }

    function formatTime(ms){
        const s = ms / 1000;
        return s.toFixed(2);
    }

    function setTarget(n){
        target = n;
        targetEl.textContent = String(target);
    }

    function stopTimer(){
        if(rafId){ cancelAnimationFrame(rafId); rafId = null; }
    }
    function tick(now){
        const ms = now - startTime;
        timerEl.textContent = formatTime(ms);
        rafId = requestAnimationFrame(tick);
    }
    function startTimer(){
        startTime = performance.now();
        rafId = requestAnimationFrame(tick);
    }

    /* ---------- game logic ---------- */
    function build(){
        // reset state
        stopTimer();
        started = false;
        timerEl.textContent = "0.00";
        toastEl.textContent = "";
        setTarget(1);

        gridEl.innerHTML = "";
        tiles = [];

        const nums = shuffle(Array.from({length:25}, (_,i)=>i+1));

        nums.forEach((n, idx) => {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "tile";
            btn.textContent = String(n);
            btn.dataset.index = String(idx);
            btn.dataset.value = String(n);

            btn.addEventListener("click", () => onPress(idx));
            gridEl.appendChild(btn);

            tiles.push({ el: btn, value: n });
        });
    }

    function onPress(idx){
        const t = tiles[idx];
        const val = t.value;

        if(val !== target) return;

        // start timing when press 1
        if(!started && target === 1){
            started = true;
            startTimer();
            toastEl.textContent = "시작!";
        }

        // correct effect
        t.el.classList.add("correct");
        setTimeout(()=>t.el.classList.remove("correct"), 120);

        // replace logic
        if(val <= 25){
            // 1~25 맞추면 26~50으로 바꾸기
            const newVal = val + 25;
            t.value = newVal;
            t.el.textContent = String(newVal);
            t.el.dataset.value = String(newVal);
        }else{
            // 26~50은 비활성(빈칸처럼)
            t.value = 0;
            t.el.textContent = "";
            t.el.classList.add("disabled");
            t.el.disabled = true;
        }

        // next target
        if(target === 50){
            finish();
        }else{
            setTarget(target + 1);
        }
    }

    function finish(){
        stopTimer();
        const final = timerEl.textContent;
        toastEl.textContent = `완료! 기록: ${final}초 🎉`;
    }

    /* ---------- events ---------- */
    btnReset.addEventListener("click", build);

    /* init */
    build();
</script>

</body>
</html>
