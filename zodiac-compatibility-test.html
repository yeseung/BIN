<!-- 파일명 예시: zodiac-compatibility-test.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>별자리 궁합 테스트</title>

    <style>
        :root{
            --bg:#ffffff;
            --panel:#ffffff;
            --text:#111827;
            --muted:#6b7280;
            --border:#e9edf5;

            --purple:#6d28d9;
            --purple2:#7c3aed;
            --purpleSoft:#f6efff;

            --cardShadow:0 22px 48px rgba(16,24,40,.12);
            --shadow2:0 14px 28px rgba(16,24,40,.10);
            --radius:26px;
        }

        *{box-sizing:border-box}
        html,body{height:100%}
        body{
            margin:0;
            background:var(--bg);
            font-family:system-ui,-apple-system,"Noto Sans KR",sans-serif;
            color:var(--text);
        }

        .wrap{
            min-height:100%;
            display:flex;
            align-items:flex-start;
            justify-content:center;
            padding:46px 16px 70px;
        }

        .container{
            width:min(980px,100%);
        }

        h1{
            text-align:center;
            margin:0 0 26px;
            font-size:54px;
            font-weight:950;
            letter-spacing:-.7px;
        }

        .stack{
            display:flex;
            flex-direction:column;
            gap:18px;
        }

        .card{
            background:var(--panel);
            border-radius:34px;
            box-shadow:var(--cardShadow);
            border:1px solid rgba(0,0,0,.02);
            overflow:hidden;
        }

        .section{
            padding:26px 20px;
        }

        .row{
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:18px;
            flex-wrap:wrap;
        }

        .titleLine{
            width:100%;
            display:flex;
            align-items:center;
            justify-content:center;
            gap:10px;
            font-weight:950;
            color:#111827;
            font-size:22px;
            margin-bottom:16px;
        }

        .selects{
            display:flex;
            gap:12px;
            flex-wrap:wrap;
            align-items:center;
            justify-content:center;
        }

        .select{
            appearance:none;
            border:2px solid #d7dde6;
            border-radius:12px;
            padding:14px 46px 14px 16px;
            font-size:18px;
            font-weight:900;
            background:#fff;
            outline:none;
            cursor:pointer;
            position:relative;
            min-width:140px;
            box-shadow:0 10px 18px rgba(16,24,40,.04);
        }
        .select:focus{
            border-color:rgba(124,58,237,.55);
            box-shadow:0 0 0 5px rgba(124,58,237,.12);
        }

        .selectWrap{
            position:relative;
            display:inline-block;
        }
        .selectWrap:after{
            content:"▾";
            position:absolute;
            right:16px;
            top:50%;
            transform:translateY(-50%);
            color:#6b7280;
            font-weight:900;
            pointer-events:none;
        }

        .zodiacBadge{
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            gap:10px;
            min-width:180px;
        }

        .zodiacIcon{
            width:86px;
            height:86px;
            border-radius:22px;
            background:linear-gradient(180deg, #a855f7, #6d28d9);
            box-shadow:0 14px 26px rgba(109,40,217,.25);
            display:grid;
            place-items:center;
            color:#fff;
            font-size:44px;
            font-weight:950;
        }

        .zodiacName{
            font-weight:950;
            font-size:22px;
        }

        .resultCard{
            background:linear-gradient(180deg, #fff5f5, #fff1f7);
            border:2px solid rgba(244,63,94,.18);
            box-shadow:var(--cardShadow);
            border-radius:34px;
            padding:26px 20px 24px;
            text-align:center;
        }

        .pair{
            font-weight:950;
            color:#374151;
            font-size:24px;
            display:flex;
            align-items:center;
            justify-content:center;
            gap:10px;
            flex-wrap:wrap;
        }

        .score{
            font-size:86px;
            font-weight:950;
            color:var(--purple2);
            margin:10px 0 14px;
            letter-spacing:-1px;
        }

        .info{
            width:min(820px, 100%);
            margin:0 auto 18px;
            background:#eff6ff;
            border:2px solid rgba(59,130,246,.30);
            border-radius:14px;
            padding:12px 14px;
            display:flex;
            gap:10px;
            align-items:flex-start;
            text-align:left;
            font-weight:900;
            color:#1f2937;
        }

        .info .i{
            width:26px;
            height:26px;
            border-radius:999px;
            background:#3b82f6;
            color:#fff;
            display:grid;
            place-items:center;
            font-size:16px;
            flex:0 0 auto;
        }

        .actions{
            display:flex;
            justify-content:center;
            gap:14px;
            flex-wrap:wrap;
        }

        .btn{
            border:none;
            cursor:pointer;
            font-weight:950;
            padding:16px 22px;
            border-radius:16px;
            font-size:20px;
            display:inline-flex;
            align-items:center;
            gap:12px;
            box-shadow:0 16px 28px rgba(16,24,40,.12);
        }
        .btn.secondary{
            background:#fff;
            color:#111827;
            border:2px solid #d7dde6;
            box-shadow:none;
        }
        .btn.primary{
            background:linear-gradient(180deg, var(--purple2), var(--purple));
            color:#fff;
        }
        .btn:active{transform:scale(.99)}

        .hidden{display:none !important}

        @media (max-width:720px){
            h1{font-size:44px}
            .score{font-size:74px}
            .zodiacBadge{min-width:150px}
        }
    </style>
</head>

<body>
<div class="wrap">
    <div class="container">
        <h1>별자리 궁합 테스트</h1>

        <div class="stack">

            <!-- 내 생일 -->
            <div class="card">
                <div class="section">
                    <div class="titleLine">🧑‍🦰 나의 생일</div>

                    <div class="row">
                        <div class="selects">
                            <div class="selectWrap">
                                <select id="m1" class="select" aria-label="내 생일 월"></select>
                            </div>
                            <div class="selectWrap">
                                <select id="d1" class="select" aria-label="내 생일 일"></select>
                            </div>
                        </div>

                        <div class="zodiacBadge" aria-label="내 별자리">
                            <div id="z1Icon" class="zodiacIcon">♒</div>
                            <div id="z1Name" class="zodiacName">물병자리</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 상대방 생일 -->
            <div class="card">
                <div class="section">
                    <div class="titleLine">💑 상대방 생일</div>

                    <div class="row">
                        <div class="selects">
                            <div class="selectWrap">
                                <select id="m2" class="select" aria-label="상대방 생일 월"></select>
                            </div>
                            <div class="selectWrap">
                                <select id="d2" class="select" aria-label="상대방 생일 일"></select>
                            </div>
                        </div>

                        <div class="zodiacBadge" aria-label="상대방 별자리">
                            <div id="z2Icon" class="zodiacIcon">♍</div>
                            <div id="z2Name" class="zodiacName">처녀자리</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 결과 -->
            <div id="result" class="resultCard">
                <div id="pair" class="pair">물병자리 ♒ × 처녀자리 ♍</div>
                <div id="score" class="score">70점</div>

                <div id="info" class="info">
                    <div class="i">i</div>
                    <div id="infoText">노력이 필요해요. 서로 다름을 이해하면 더 좋아질 거예요 💪</div>
                </div>

                <div class="actions">
                    <button id="btnReset" class="btn secondary" type="button">🔄 다시하기</button>
                    <button id="btnShare" class="btn primary" type="button">🔗 결과 공유하기</button>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    /* =========================================================
       별자리 궁합 테스트 (재미용)
       - 생일(월/일) → 서양 12별자리 계산
       - 별자리 조합 → 점수(의사랜덤/재현 가능) + 메시지
       - 광고/Bootstrap 없음, 순수 JS
    ========================================================= */

    const $ = (id) => document.getElementById(id);

    const m1 = $("m1"), d1 = $("d1");
    const m2 = $("m2"), d2 = $("d2");

    const z1Icon = $("z1Icon"), z1Name = $("z1Name");
    const z2Icon = $("z2Icon"), z2Name = $("z2Name");

    const pairEl = $("pair");
    const scoreEl = $("score");
    const infoText = $("infoText");

    const btnReset = $("btnReset");
    const btnShare = $("btnShare");

    const zodiac = [
        // start: [month, day]
        { key:"aquarius",  name:"물병자리", icon:"♒", start:[1,20] },
        { key:"pisces",    name:"물고기자리", icon:"♓", start:[2,19] },
        { key:"aries",     name:"양자리", icon:"♈", start:[3,21] },
        { key:"taurus",    name:"황소자리", icon:"♉", start:[4,20] },
        { key:"gemini",    name:"쌍둥이자리", icon:"♊", start:[5,21] },
        { key:"cancer",    name:"게자리", icon:"♋", start:[6,22] },
        { key:"leo",       name:"사자자리", icon:"♌", start:[7,23] },
        { key:"virgo",     name:"처녀자리", icon:"♍", start:[8,23] },
        { key:"libra",     name:"천칭자리", icon:"♎", start:[9,23] },
        { key:"scorpio",   name:"전갈자리", icon:"♏", start:[10,23] },
        { key:"sagittarius", name:"사수자리", icon:"♐", start:[11,22] },
        { key:"capricorn", name:"염소자리", icon:"♑", start:[12,22] },
    ];

    // 월별 일수(윤년 무시, 재미용이라 충분)
    const daysInMonth = [31,28,31,30,31,30,31,31,30,31,30,31];

    function fillMonth(select){
        select.innerHTML = "";
        for(let i=1;i<=12;i++){
            const opt = document.createElement("option");
            opt.value = String(i);
            opt.textContent = `${i}월`;
            select.appendChild(opt);
        }
    }

    function fillDay(select, month){
        select.innerHTML = "";
        const max = daysInMonth[month-1] || 31;
        for(let d=1; d<=max; d++){
            const opt = document.createElement("option");
            opt.value = String(d);
            opt.textContent = `${d}일`;
            select.appendChild(opt);
        }
    }

    function getZodiac(month, day){
        // 기준: start date부터 해당 별자리
        // 12/22~1/19 = 염소자리(capricorn) 처리 위해 기본을 capricorn으로 시작
        let current = zodiac.find(z => z.key === "capricorn");

        for(const z of zodiac){
            const [sm, sd] = z.start;
            if(month > sm || (month === sm && day >= sd)){
                current = z;
            }
        }

        // 1월 1~19는 capricorn 유지, 1/20부터 aquarius로 바뀜 (위 로직으로 OK)
        return current;
    }

    // 재현 가능한 점수 생성(별자리 키 + 생일 숫자 기반)
    function stableScore(zA, zB, aMonth, aDay, bMonth, bDay){
        // 간단 해시
        const str = `${zA.key}|${zB.key}|${aMonth}-${aDay}|${bMonth}-${bDay}`;
        let h = 2166136261; // FNV-1a 느낌
        for(let i=0;i<str.length;i++){
            h ^= str.charCodeAt(i);
            h = Math.imul(h, 16777619);
        }
        // 35~99 범위로 맵핑
        const base = Math.abs(h) % 65; // 0~64
        return 35 + base;             // 35~99
    }

    function messageByScore(score){
        if(score >= 90) return "완벽한 케미! 말하지 않아도 통하는 느낌이에요 ✨";
        if(score >= 80) return "아주 좋아요! 서로의 장점을 잘 살려주는 조합이에요 🙂";
        if(score >= 70) return "노력이 필요해요. 서로 다름을 이해하면 더 좋아질 거예요 💪";
        if(score >= 60) return "무난해요! 대화를 자주 하면 궁합이 더 올라가요 😊";
        if(score >= 50) return "조금은 엇갈릴 수 있어요. 대신 배울 점이 많아요 🤝";
        return "쉽진 않지만… 진심과 배려가 있으면 가능해요 🌿";
    }

    function updatePerson(which){
        const month = Number(which === 1 ? m1.value : m2.value);
        const day = Number(which === 1 ? d1.value : d2.value);
        const z = getZodiac(month, day);

        if(which === 1){
            z1Icon.textContent = z.icon;
            z1Name.textContent = z.name;
        }else{
            z2Icon.textContent = z.icon;
            z2Name.textContent = z.name;
        }
        return z;
    }

    function updateAll(){
        const zA = updatePerson(1);
        const zB = updatePerson(2);

        const aMonth = Number(m1.value), aDay = Number(d1.value);
        const bMonth = Number(m2.value), bDay = Number(d2.value);

        const score = stableScore(zA, zB, aMonth, aDay, bMonth, bDay);

        pairEl.textContent = `${zA.name} ${zA.icon} × ${zB.name} ${zB.icon}`;
        scoreEl.textContent = `${score}점`;
        infoText.textContent = messageByScore(score);
    }

    function resetAll(){
        // 기본값(스크린샷 느낌)
        m1.value = "1";  fillDay(d1, 1);  d1.value = "21";
        m2.value = "8";  fillDay(d2, 8);  d2.value = "28";
        updateAll();
    }

    async function share(){
        const text = `⭐ 별자리 궁합 테스트\n${pairEl.textContent}\n${scoreEl.textContent}\n${infoText.textContent}`;
        try{
            if(navigator.share){
                await navigator.share({ title:"별자리 궁합 테스트", text });
            }else{
                await navigator.clipboard.writeText(text);
                alert("공유 문구를 복사했어요!\n\n" + text);
            }
        }catch(e){}
    }

    /* 초기 구성 */
    fillMonth(m1); fillMonth(m2);
    fillDay(d1, 1); fillDay(d2, 8);

    // 기본값
    m1.value = "1";  d1.value = "21";
    m2.value = "8";  d2.value = "28";
    updateAll();

    /* 이벤트: 월 변경 시 일수 갱신 */
    m1.addEventListener("change", () => {
        const month = Number(m1.value);
        const prev = Number(d1.value);
        fillDay(d1, month);
        d1.value = String(Math.min(prev, daysInMonth[month-1]));
        updateAll();
    });
    d1.addEventListener("change", updateAll);

    m2.addEventListener("change", () => {
        const month = Number(m2.value);
        const prev = Number(d2.value);
        fillDay(d2, month);
        d2.value = String(Math.min(prev, daysInMonth[month-1]));
        updateAll();
    });
    d2.addEventListener("change", updateAll);

    btnReset.addEventListener("click", resetAll);
    btnShare.addEventListener("click", share);
</script>

</body>
</html>
