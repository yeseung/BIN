<!-- 파일명 예시: lucky-draw-game.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>제비뽑기 게임</title>

    <style>
        :root{
            --bg:#ffffff;
            --panel:#ffffff;
            --stage:#ffffff;
            --border:#e8edf3;
            --soft:#f6f8fb;
            --text:#111827;
            --muted:#6b7280;

            --green:#35c24a;
            --btn:#111827;

            --shadow:0 20px 45px rgba(16,24,40,.10);
            --shadow2:0 12px 24px rgba(16,24,40,.10);
            --radius:28px;
        }

        *{box-sizing:border-box}
        html,body{height:100%}
        body{
            margin:0;
            background:var(--bg);
            font-family:system-ui,-apple-system,"Noto Sans KR",sans-serif;
            color:var(--text);
        }

        .wrap{
            min-height:100%;
            display:flex;
            align-items:flex-start;
            justify-content:center;
            padding:46px 16px 70px;
        }

        .container{
            width:min(1100px, 100%);
            text-align:center;
        }

        h1{
            margin:0 0 26px;
            font-size:56px;
            font-weight:950;
            letter-spacing:-.8px;
        }

        .panel{
            background:var(--panel);
            border-radius:36px;
            box-shadow:var(--shadow);
            padding:34px 28px 30px;
            border:1px solid rgba(0,0,0,.02);
        }

        .tabs{
            display:inline-flex;
            background:var(--soft);
            border:1px solid var(--border);
            border-radius:18px;
            padding:6px;
            gap:6px;
            margin-bottom:26px;
        }

        .tab{
            appearance:none;
            border:none;
            background:transparent;
            padding:12px 18px;
            font-size:20px;
            font-weight:900;
            border-radius:14px;
            cursor:pointer;
            color:#6b7280;
            display:flex;
            align-items:center;
            gap:10px;
        }
        .tab.active{
            background:#fff;
            color:#111827;
            box-shadow:0 10px 18px rgba(16,24,40,.08);
        }

        .controls{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:24px;
            align-items:end;
            margin:10px 0 26px;
        }

        .control{
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:10px;
        }

        .control .label{
            font-size:22px;
            font-weight:900;
        }

        .stepper{
            display:inline-grid;
            grid-template-columns:56px 92px 56px;
            border:2px solid #d7dde6;
            border-radius:12px;
            overflow:hidden;
            background:#fff;
        }
        .stepper button{
            border:none;
            background:#fff;
            font-size:28px;
            font-weight:900;
            cursor:pointer;
            height:52px;
        }
        .stepper button:active{background:#f2f4f8}
        .stepper .value{
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:24px;
            font-weight:950;
            border-left:2px solid #d7dde6;
            border-right:2px solid #d7dde6;
            height:52px;
            min-width:92px;
        }

        .hr{
            height:1px;
            background:#eef2f7;
            margin:18px 0 24px;
        }

        .row{
            display:flex;
            gap:18px;
            justify-content:center;
            flex-wrap:wrap;
            padding:10px 4px 6px;
        }

        .cardWrap{
            width:120px;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:10px;
        }

        .badge{
            width:36px;
            height:36px;
            border-radius:999px;
            background:#f1f3f6;
            color:#8b95a7;
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:950;
        }

        .luckyCard{
            width:110px;
            height:140px;
            border-radius:14px;
            background:#fff;
            border:1px solid var(--border);
            box-shadow:0 12px 22px rgba(16,24,40,.10);
            cursor:pointer;
            user-select:none;
            position:relative;
            overflow:hidden;
            transition:transform .12s ease, box-shadow .12s ease;
        }
        .luckyCard:hover{transform:translateY(-2px)}
        .luckyCard:active{transform:translateY(0) scale(.99)}

        .luckyCard .cover{
            position:absolute;
            inset:0;
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:950;
            color:#fff;
            font-size:18px;
            letter-spacing:.2px;
            background:linear-gradient(135deg, rgba(255,255,255,.18), rgba(0,0,0,.08));
        }
        .luckyCard .cover::before,
        .luckyCard .cover::after{
            content:"";
            position:absolute;
            width:140%;
            height:140%;
            left:-20%;
            top:-20%;
            background:
                    linear-gradient(45deg, rgba(255,255,255,.22), rgba(255,255,255,0) 60%);
            transform:rotate(12deg);
        }
        .luckyCard .cover::after{
            transform:rotate(-22deg);
            opacity:.55;
        }

        .luckyCard .reveal{
            position:absolute;
            inset:0;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:46px;
            font-weight:950;
            color:#111827;
            background:#ffffff;
        }

        .luckyCard .circle{
            width:72px;
            height:72px;
            border-radius:999px;
            background:#f1f4f9;
            display:flex;
            align-items:center;
            justify-content:center;
            box-shadow:inset 0 6px 10px rgba(16,24,40,.06);
        }

        .luckyCard.revealed{
            cursor:default;
        }
        .luckyCard.revealed:hover{transform:none}

        .actions{
            margin-top:22px;
            display:flex;
            gap:16px;
            justify-content:center;
            flex-wrap:wrap;
        }

        .btn{
            border:none;
            cursor:pointer;
            font-weight:950;
            padding:16px 22px;
            border-radius:18px;
            font-size:22px;
            display:inline-flex;
            align-items:center;
            gap:12px;
            box-shadow:0 16px 28px rgba(16,24,40,.12);
        }
        .btn.primary{
            background:var(--green);
            color:#fff;
        }
        .btn.secondary{
            background:#fff;
            color:#111827;
            border:2px solid #d7dde6;
            box-shadow:none;
        }
        .btn:active{transform:scale(.99)}

        .btn[disabled]{
            opacity:.45;
            cursor:not-allowed;
            transform:none;
        }

        .toast{
            margin-top:14px;
            min-height:26px;
            color:var(--muted);
            font-weight:850;
        }

        .note{
            margin-top:8px;
            color:#9aa3b2;
            font-weight:800;
            font-size:14px;
        }

        .hidden{display:none !important}

        /* mobile */
        @media (max-width:720px){
            h1{font-size:44px}
            .controls{grid-template-columns:1fr}
            .cardWrap{width:104px}
            .luckyCard{width:96px;height:128px}
        }
    </style>
</head>

<body>
<div class="wrap">
    <div class="container">
        <h1>제비뽑기 게임</h1>

        <div class="panel">
            <div class="tabs" role="tablist" aria-label="모드 선택">
                <button id="tabLucky" class="tab active" role="tab" aria-selected="true" type="button">🔥 꽝 뽑기</button>
                <button id="tabOrder" class="tab" role="tab" aria-selected="false" type="button">🏆 순서 정하기</button>
            </div>

            <div class="controls">
                <div class="control">
                    <div class="label">참가자 수</div>
                    <div class="stepper" aria-label="참가자 수 조절">
                        <button id="pMinus" type="button" aria-label="참가자 수 감소">−</button>
                        <div id="pVal" class="value">7</div>
                        <button id="pPlus" type="button" aria-label="참가자 수 증가">+</button>
                    </div>
                </div>

                <div id="loserControl" class="control">
                    <div class="label">꽝 개수</div>
                    <div class="stepper" aria-label="꽝 개수 조절">
                        <button id="lMinus" type="button" aria-label="꽝 개수 감소">−</button>
                        <div id="lVal" class="value">2</div>
                        <button id="lPlus" type="button" aria-label="꽝 개수 증가">+</button>
                    </div>
                </div>
            </div>

            <div class="hr"></div>

            <div id="row" class="row" aria-label="카드 목록"></div>

            <div class="actions">
                <button id="btnReveal" class="btn primary" type="button">
                    👁️ 제비뽑기 결과 보기
                </button>
                <button id="btnReset" class="btn secondary" type="button">
                    ↩️ 제비뽑기 초기화
                </button>
            </div>

            <div id="toast" class="toast"></div>
            <div class="note">카드를 클릭하면 개별 공개됩니다. “결과 보기”는 한 번에 모두 공개합니다.</div>
        </div>
    </div>
</div>

<script>
    /* =========================================
       제비뽑기 게임
       - 모드1: 꽝 뽑기 (N명 중 L명이 꽝)
       - 모드2: 순서 정하기 (1~N 무작위 배치)
       - 순수 HTML/CSS/JS (Bootstrap/광고 없음)
    ========================================= */

    let mode = "lucky"; // lucky | order
    let participants = 4;
    let losers = 1;

    let assigned = [];      // 각 카드에 들어갈 값(꽝/통과 or 순서번호)
    let revealed = [];      // 공개 여부
    let locked = false;     // 결과 확정 후 설정 변경 방지 옵션(여기선 안내만)

    const tabLucky = document.getElementById("tabLucky");
    const tabOrder = document.getElementById("tabOrder");

    const pMinus = document.getElementById("pMinus");
    const pPlus  = document.getElementById("pPlus");
    const pVal   = document.getElementById("pVal");

    const loserControl = document.getElementById("loserControl");
    const lMinus = document.getElementById("lMinus");
    const lPlus  = document.getElementById("lPlus");
    const lVal   = document.getElementById("lVal");

    const row = document.getElementById("row");
    const toast = document.getElementById("toast");
    const btnReveal = document.getElementById("btnReveal");
    const btnReset = document.getElementById("btnReset");

    const COLORS = [
        "#59b43b","#7b2fe7","#91a773","#b45b92","#d9f0a9","#34c24a","#6f3be0",
        "#7fc56d","#9c44e6","#a7b7c9"
    ];

    function clamp(n, min, max){ return Math.max(min, Math.min(max, n)); }

    function shuffle(a){
        for(let i=a.length-1;i>0;i--){
            const j = Math.floor(Math.random()*(i+1));
            [a[i],a[j]]=[a[j],a[i]];
        }
        return a;
    }

    function setMode(nextMode){
        mode = nextMode;
        const isLucky = mode === "lucky";

        tabLucky.classList.toggle("active", isLucky);
        tabLucky.setAttribute("aria-selected", String(isLucky));
        tabOrder.classList.toggle("active", !isLucky);
        tabOrder.setAttribute("aria-selected", String(!isLucky));

        loserControl.classList.toggle("hidden", !isLucky);

        toast.textContent = isLucky
            ? "꽝 뽑기 모드: 꽝 개수를 설정하고 카드를 뽑아보세요."
            : "순서 정하기 모드: 카드를 뽑으면 내 순서가 공개됩니다.";

        // 모드 바꾸면 초기화
        resetGame();
    }

    function updateSteppers(){
        pVal.textContent = String(participants);
        lVal.textContent = String(losers);

        // 꽝은 참가자보다 클 수 없음(최소 0, 최대 participants-1 권장)
        losers = clamp(losers, 0, Math.max(0, participants));
        lVal.textContent = String(losers);
    }

    function buildAssigned(){
        // revealed 초기화
        revealed = Array(participants).fill(false);

        if(mode === "lucky"){
            // losers개 만큼 "꽝", 나머지는 "통과"
            const arr = Array(participants).fill("통과");
            // losers가 participants면 전부 꽝(허용). 필요하면 participants-1로 제한해도 됨.
            const idx = shuffle(Array.from({length:participants}, (_,i)=>i)).slice(0, losers);
            idx.forEach(i => arr[i] = "꽝");
            assigned = arr;
        }else{
            // 1~N 무작위
            assigned = shuffle(Array.from({length:participants}, (_,i)=>i+1));
        }
    }

    function renderCards(){
        row.innerHTML = "";

        for(let i=0;i<participants;i++){
            const wrap = document.createElement("div");
            wrap.className = "cardWrap";

            const badge = document.createElement("div");
            badge.className = "badge";
            badge.textContent = String(i+1);

            const card = document.createElement("div");
            card.className = "luckyCard";
            card.dataset.index = String(i);

            // cover color
            const cover = document.createElement("div");
            cover.className = "cover";
            cover.style.backgroundColor = COLORS[i % COLORS.length];
            cover.textContent = ""; // 봉투 느낌 (텍스트 비움)

            const reveal = document.createElement("div");
            reveal.className = "reveal";
            reveal.style.display = "none";

            const circle = document.createElement("div");
            circle.className = "circle";
            circle.textContent = ""; // 여기에 값
            reveal.appendChild(circle);

            card.appendChild(reveal);
            card.appendChild(cover);

            // 초기 상태
            applyCardState(card, i);

            // click
            card.addEventListener("click", () => {
                if(revealed[i]) return;
                revealOne(i);
            });

            wrap.appendChild(badge);
            wrap.appendChild(card);
            row.appendChild(wrap);
        }

        // 버튼 상태
        btnReveal.disabled = false;
        toast.textContent = "카드를 눌러 뽑아보세요!";
    }

    function applyCardState(card, i){
        const cover = card.querySelector(".cover");
        const reveal = card.querySelector(".reveal");
        const circle = card.querySelector(".circle");

        if(!revealed[i]){
            card.classList.remove("revealed");
            cover.style.display = "flex";
            reveal.style.display = "none";
        }else{
            card.classList.add("revealed");
            cover.style.display = "none";
            reveal.style.display = "flex";

            const val = assigned[i];
            circle.textContent = String(val);

            // "꽝"이면 빨강 포인트
            if(mode === "lucky" && val === "꽝"){
                circle.style.background = "#ffe6e6";
                circle.style.color = "#c81e1e";
            }else{
                circle.style.background = "#f1f4f9";
                circle.style.color = "#111827";
            }
        }
    }

    function revealOne(i){
        revealed[i] = true;
        const card = row.querySelector(`.luckyCard[data-index="${i}"]`);
        applyCardState(card, i);

        if(mode === "lucky"){
            toast.textContent = assigned[i] === "꽝" ? "😵 꽝!" : "✅ 통과!";
        }else{
            toast.textContent = `🎉 당신의 순서: ${assigned[i]}번`;
        }

        // 모두 공개되면 안내
        if(revealed.every(Boolean)){
            btnReveal.disabled = true;
            toast.textContent = "모두 공개 완료! 초기화해서 다시 할 수 있어요.";
        }
    }

    function revealAll(){
        for(let i=0;i<participants;i++){
            if(!revealed[i]) revealed[i] = true;
        }
        row.querySelectorAll(".luckyCard").forEach(card=>{
            const i = Number(card.dataset.index);
            applyCardState(card, i);
        });
        btnReveal.disabled = true;

        if(mode === "lucky"){
            const loserCount = assigned.filter(v=>v==="꽝").length;
            toast.textContent = `전체 공개 완료! 꽝: ${loserCount}명`;
        }else{
            toast.textContent = "전체 공개 완료! 각자 순서를 확인하세요.";
        }
    }

    function resetGame(){
        buildAssigned();
        renderCards();
    }

    function adjustParticipants(delta){
        participants = clamp(participants + delta, 2, 30);
        // 참가자 줄이면 꽝도 같이 클램프
        losers = clamp(losers, 0, participants);
        updateSteppers();
        resetGame();
    }

    function adjustLosers(delta){
        losers = clamp(losers + delta, 0, participants);
        updateSteppers();
        resetGame();
    }

    /* 이벤트 */
    tabLucky.addEventListener("click", () => setMode("lucky"));
    tabOrder.addEventListener("click", () => setMode("order"));

    pMinus.addEventListener("click", () => adjustParticipants(-1));
    pPlus.addEventListener("click", () => adjustParticipants(+1));

    lMinus.addEventListener("click", () => adjustLosers(-1));
    lPlus.addEventListener("click", () => adjustLosers(+1));

    btnReveal.addEventListener("click", revealAll);
    btnReset.addEventListener("click", resetGame);

    /* 초기 렌더 */
    updateSteppers();
    buildAssigned();
    renderCards();
    toast.textContent = "카드를 눌러 뽑아보세요!";
</script>
</body>
</html>
